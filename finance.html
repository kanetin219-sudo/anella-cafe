<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>収支管理 | ANELLA CAFE 大分店</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #FDF6EE;
      --surface: #FFFAF4;
      --primary: #C96A3B;
      --primary-light: #E8946A;
      --accent: #4A7C6F;
      --accent-light: #6FA898;
      --text: #2C1F14;
      --text-mid: #6B4F3A;
      --text-soft: #A88870;
      --border: #E8D5C0;
      --shadow: rgba(150, 80, 30, 0.12);
      --warn: #D4502A;
      --warn-bg: #FFF3EE;
      --gray: #9E9E9E;
      --gray-bg: #F5F5F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

    /* ── ログイン画面 ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px var(--shadow);
    }
    .login-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--primary); text-align: center; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-soft); text-align: center; margin-bottom: 32px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; }
    .login-field input {
      width: 100%; padding: 13px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--text); outline: none;
    }
    .login-field input:focus { border-color: var(--primary-light); }
    .login-btn {
      width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px; box-shadow: 0 4px 12px rgba(201,106,59,0.3); transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { background: #D0B49E; box-shadow: none; cursor: not-allowed; }
    .login-err { color: var(--warn); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    .login-err.active { display: block; }

    /* ── メイン画面 ── */
    #mainScreen { display: none; }

    /* ── ヘッダー ── */
    .admin-header {
      background: var(--text); color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--primary-light); }
    .admin-header-center { display: flex; align-items: center; gap: 10px; }
    .month-picker {
      padding: 8px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: #fff;
      cursor: pointer; outline: none;
    }
    .month-picker::-webkit-calendar-picker-indicator { filter: invert(1); }
    .btn-this-month {
      padding: 8px 13px; background: var(--primary); color: #fff; border: none; border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .admin-header-right { display: flex; align-items: center; gap: 12px; }
    .admin-user { font-size: 12px; color: #bbb; }
    .logout-btn {
      padding: 7px 14px; background: transparent; border: 1px solid #555; border-radius: 8px;
      color: #ccc; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #aaa; color: #fff; }

    /* ── タブ ── */
    .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 80px; padding: 13px 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text-soft); background: none; border: none; border-bottom: 3px solid transparent;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .container { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── サマリーカード ── */
    .summary-cards {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;
    }
    .sum-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 14px; text-align: center; box-shadow: 0 2px 8px var(--shadow);
    }
    .sum-card-label { font-size: 11px; color: var(--text-soft); font-weight: 700; margin-bottom: 6px; }
    .sum-card-value { font-size: 22px; font-weight: 700; color: var(--primary); }
    .sum-card-value.income { color: var(--accent); }
    .sum-card-value.expense { color: var(--text-mid); }
    .sum-card-value.salary { color: #7B68EE; }
    .sum-card-value.profit-plus { color: var(--accent); }
    .sum-card-value.profit-minus { color: var(--warn); }

    /* ── チャートエリア ── */
    .charts-area {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
    }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; box-shadow: 0 2px 8px var(--shadow);
    }
    .chart-title { font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 14px; text-align: center; }
    .chart-wrap { position: relative; height: 200px; }

    /* ── 内訳テーブル ── */
    .section-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow);
    }
    .section-title {
      font-size: 14px; font-weight: 700; color: var(--text-mid); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 11px; color: var(--text-soft); font-weight: 700; text-align: left;
      padding: 8px 10px; border-bottom: 2px solid var(--border);
    }
    .data-table td { font-size: 13px; padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table td.amount { font-weight: 700; color: var(--text); text-align: right; }
    .data-table td.category { color: var(--text-mid); }
    .data-table td.memo { color: var(--text-soft); font-size: 12px; }
    .data-table th.right { text-align: right; }
    .data-table td.right { text-align: right; }
    .no-data { text-align: center; padding: 24px; color: var(--text-soft); font-size: 13px; }

    /* ── 月合計 ── */
    .month-total {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .month-total-label { font-size: 13px; color: var(--text-mid); font-weight: 700; }
    .month-total-value { font-size: 20px; font-weight: 700; color: var(--primary); }

    /* ── 追加フォーム ── */
    .add-form-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow);
    }
    .add-form-title { font-size: 14px; font-weight: 700; color: var(--text-mid); margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
    .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 11px; font-weight: 700; color: var(--text-soft); }
    .form-input {
      padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--text); outline: none;
      width: 100%; appearance: none; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--primary-light); }
    .form-select-wrap { position: relative; }
    .form-select-wrap::after {
      content: '▼'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--text-soft); pointer-events: none;
    }
    .form-select-wrap .form-input { padding-right: 28px; }
    .add-btn {
      padding: 11px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-btn:hover { opacity: 0.9; }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 削除ボタン ── */
    .del-btn {
      padding: 5px 10px; background: none; border: 1px solid #F0C4B0; border-radius: 6px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--warn); cursor: pointer;
      white-space: nowrap;
    }
    .del-btn:hover { background: var(--warn-bg); }

    /* ── バッジ ── */
    .pay-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .pay-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700;
    }
    .pay-badge.cash { background: #E8F5E9; color: var(--accent); border: 1px solid #C8E0DB; }
    .pay-badge.card { background: #EEF2FF; color: #5C6BC0; border: 1px solid #C5CAE9; }
    .pay-badge.emoney { background: #FFF8E1; color: #F57F17; border: 1px solid #FFE082; }

    /* ── カテゴリバッジ ── */
    .cat-badge {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px;
      background: var(--warn-bg); color: var(--primary); border: 1px solid #F0C4B0; font-weight: 700;
    }
    .cat-badge.green { background: #E8F5E9; color: var(--accent); border-color: #C8E0DB; }
    .cat-badge.blue { background: #EEF2FF; color: #5C6BC0; border-color: #C5CAE9; }
    .cat-badge.yellow { background: #FFF8E1; color: #F57F17; border-color: #FFE082; }
    .cat-badge.gray { background: var(--gray-bg); color: var(--gray); border-color: #ddd; }

    /* ── ローディング ── */
    .loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(253,246,238,0.85);
      z-index: 200; align-items: center; justify-content: center;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── レスポンシブ ── */
    @media (max-width: 700px) {
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
      .charts-area { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid-3 { grid-template-columns: 1fr 1fr; }
      .admin-header { flex-direction: column; align-items: flex-start; }
      .admin-header-center { width: 100%; }
      .month-picker { flex: 1; }
    }
    @media (max-width: 480px) {
      .summary-cards { grid-template-columns: 1fr 1fr; }
      .form-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- ===== ログイン画面 ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">ANELLA CAFE</div>
    <div class="login-sub">収支管理システム</div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="anellacafeoita@gmail.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="mainScreen">

  <!-- ヘッダー -->
  <div class="admin-header">
    <div class="admin-header-logo">ANELLA Finance</div>
    <div class="admin-header-center">
      <input type="month" id="monthPicker" class="month-picker" onchange="onMonthChange()">
      <button class="btn-this-month" onclick="setThisMonth()">今月</button>
    </div>
    <div class="admin-header-right">
      <span class="admin-user" id="adminUserLabel"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab1" onclick="switchTab(1)">📊 月次サマリー</button>
    <button class="tab-btn" id="tab2" onclick="switchTab(2)">💰 売上</button>
    <button class="tab-btn" id="tab3" onclick="switchTab(3)">📦 経費</button>
    <button class="tab-btn" id="tab4" onclick="switchTab(4)">👥 給与</button>
    <button class="tab-btn" id="tab5" onclick="switchTab(5)">🏢 固定費</button>
  </div>

  <div class="container">

    <!-- ===== 月次サマリータブ ===== -->
    <div class="tab-panel active" id="panel1">

      <div class="summary-cards">
        <div class="sum-card">
          <div class="sum-card-label">総収入</div>
          <div class="sum-card-value income" id="summaryIncome">¥0</div>
        </div>
        <div class="sum-card">
          <div class="sum-card-label">総経費</div>
          <div class="sum-card-value expense" id="summaryExpense">¥0</div>
        </div>
        <div class="sum-card">
          <div class="sum-card-label">給与合計</div>
          <div class="sum-card-value salary" id="summarySalary">¥0</div>
        </div>
        <div class="sum-card">
          <div class="sum-card-label">当月利益</div>
          <div class="sum-card-value" id="summaryProfit">¥0</div>
        </div>
      </div>

      <div class="charts-area">
        <div class="chart-card">
          <div class="chart-title">収入内訳（カテゴリ別）</div>
          <div class="chart-wrap">
            <canvas id="incomeChart"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-title">支出内訳（経費カテゴリ別）</div>
          <div class="chart-wrap">
            <canvas id="expenseChart"></canvas>
          </div>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title">📋 詳細内訳</div>
        <table class="data-table">
          <thead>
            <tr>
              <th>項目</th>
              <th class="right">金額</th>
              <th class="right">割合</th>
            </tr>
          </thead>
          <tbody id="summaryDetailTable">
            <tr><td colspan="3" class="no-data">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ===== 売上タブ ===== -->
    <div class="tab-panel" id="panel2">

      <div class="add-form-card">
        <div class="add-form-title">＋ 売上を追加</div>
        <div class="form-grid">
          <div class="form-field">
            <label>日付</label>
            <input type="date" id="incDate" class="form-input">
          </div>
          <div class="form-field">
            <label>カテゴリ</label>
            <div class="form-select-wrap">
              <select id="incCategory" class="form-input">
                <option value="カフェ">カフェ</option>
                <option value="トリミング">トリミング</option>
                <option value="その他">その他</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>合計金額（円）</label>
            <input type="number" id="incAmount" class="form-input" placeholder="例: 15000" min="0">
          </div>
          <div class="form-field">
            <label>メモ（任意）</label>
            <input type="text" id="incMemo" class="form-input" placeholder="備考など">
          </div>
        </div>
        <div class="form-grid-3">
          <div class="form-field">
            <label>現金（任意）</label>
            <input type="number" id="incCash" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-field">
            <label>カード（任意）</label>
            <input type="number" id="incCard" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-field">
            <label>電子マネー（任意）</label>
            <input type="number" id="incEmoney" class="form-input" placeholder="0" min="0">
          </div>
        </div>
        <button class="add-btn" id="incAddBtn" onclick="addIncome()">追加する</button>
      </div>

      <div class="month-total">
        <span class="month-total-label">月合計</span>
        <span class="month-total-value" id="incomeMonthTotal">¥0</span>
      </div>

      <div class="section-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>カテゴリ</th>
              <th class="right">金額</th>
              <th>内訳</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="incomeTable">
            <tr><td colspan="6" class="no-data">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ===== 経費タブ ===== -->
    <div class="tab-panel" id="panel3">

      <div class="add-form-card">
        <div class="add-form-title">＋ 経費を追加</div>
        <div class="form-grid">
          <div class="form-field">
            <label>日付</label>
            <input type="date" id="expDate" class="form-input">
          </div>
          <div class="form-field">
            <label>カテゴリ</label>
            <div class="form-select-wrap">
              <select id="expCategory" class="form-input">
                <option value="食材仕入れ">食材仕入れ</option>
                <option value="消耗品">消耗品</option>
                <option value="光熱費">光熱費</option>
                <option value="通信費">通信費</option>
                <option value="広告費">広告費</option>
                <option value="修繕費">修繕費</option>
                <option value="その他">その他</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>金額（円）</label>
            <input type="number" id="expAmount" class="form-input" placeholder="例: 30000" min="0">
          </div>
          <div class="form-field">
            <label>メモ（任意）</label>
            <input type="text" id="expMemo" class="form-input" placeholder="備考など">
          </div>
        </div>
        <button class="add-btn" id="expAddBtn" onclick="addExpense()">追加する</button>
      </div>

      <div class="month-total">
        <span class="month-total-label">月合計</span>
        <span class="month-total-value" id="expenseMonthTotal">¥0</span>
      </div>

      <div class="section-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>カテゴリ</th>
              <th class="right">金額</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expenseTable">
            <tr><td colspan="5" class="no-data">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ===== 給与タブ ===== -->
    <div class="tab-panel" id="panel4">

      <div class="add-form-card">
        <div class="add-form-title">＋ 給与を追加</div>
        <div class="form-grid">
          <div class="form-field">
            <label>スタッフ名</label>
            <input type="text" id="salStaff" class="form-input" placeholder="名前を入力" list="staffNameList">
            <datalist id="staffNameList"></datalist>
          </div>
          <div class="form-field">
            <label>金額（円）</label>
            <input type="number" id="salAmount" class="form-input" placeholder="例: 200000" min="0">
          </div>
          <div class="form-field" style="grid-column: 1 / -1;">
            <label>メモ（任意）</label>
            <input type="text" id="salMemo" class="form-input" placeholder="備考など">
          </div>
        </div>
        <button class="add-btn" id="salAddBtn" onclick="addSalary()">追加する</button>
      </div>

      <div class="month-total">
        <span class="month-total-label">月合計</span>
        <span class="month-total-value" id="salaryMonthTotal">¥0</span>
      </div>

      <div class="section-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>スタッフ名</th>

<script>
// ── 状態 ──────────────────────────────────────────
let currentMonth = '';
let activeTab = 1;
let incomeChartInstance = null;
let expenseChartInstance = null;

// ── 認証 ──────────────────────────────────────────
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    showMain(session.user.email);
  }
}

async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');
  const err      = document.getElementById('loginErr');

  if (!email || !password) { showLoginErr('メールとパスワードを入力してください'); return; }

  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  err.classList.remove('active');

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'ログイン';

  if (error) {
    showLoginErr('メールまたはパスワードが正しくありません');
    return;
  }
  showMain(data.user.email);
}

async function doLogout() {
  await supabase.auth.signOut();
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.classList.add('active');
}

function showMain(email) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  document.getElementById('adminUserLabel').textContent = email;
  setThisMonth();
  loadStaffNames();
}

// ── 月選択 ──────────────────────────────────────
function setThisMonth() {
  const now = new Date();
  const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('monthPicker').value = ym;
  currentMonth = ym;
  loadCurrentTab();
}

function onMonthChange() {
  currentMonth = document.getElementById('monthPicker').value;
  if (!currentMonth) return;
  loadCurrentTab();
}

function loadCurrentTab() {
  switch (activeTab) {
    case 1: loadSummary(); break;
    case 2: loadIncome(); break;
    case 3: loadExpense(); break;
    case 4: loadSalary(); break;
    case 5: loadFixed(); break;
  }
}

// ── タブ切替 ─────────────────────────────────────
function switchTab(n) {
  activeTab = n;
  [1, 2, 3, 4, 5].forEach(i => {
    document.getElementById('tab'   + i).classList.toggle('active', i === n);
    document.getElementById('panel' + i).classList.toggle('active', i === n);
  });
  // 今日の日付をフォームにセット
  const today = new Date().toISOString().slice(0, 10);
  if (n === 2 && !document.getElementById('incDate').value) document.getElementById('incDate').value = today;
  if (n === 3 && !document.getElementById('expDate').value) document.getElementById('expDate').value = today;
  loadCurrentTab();
}

// ── 月の開始・終了日を計算 ──────────────────────
function getMonthRange(ym) {
  const [y, m] = ym.split('-').map(Number);
  const start = `${ym}-01`;
  const lastDay = new Date(y, m, 0).getDate();
  const end   = `${ym}-${String(lastDay).padStart(2, '0')}`;
  return { start, end };
}

// ── ローディング ──────────────────────────────────
function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

// ── 金額フォーマット ──────────────────────────────
function fmt(n) { return '¥' + Number(n || 0).toLocaleString('ja-JP'); }

// ── カテゴリバッジ ────────────────────────────────
function incomeCatBadge(cat) {
  const cls = cat === 'カフェ' ? '' : cat === 'トリミング' ? 'green' : 'blue';
  return `<span class="cat-badge ${cls}">${cat}</span>`;
}
function expenseCatBadge(cat) {
  const map = {
    '食材仕入れ': '', '消耗品': 'green', '光熱費': 'yellow',
    '通信費': 'blue', '広告費': 'blue', '修繕費': 'yellow', 'その他': 'gray'
  };
  return `<span class="cat-badge ${map[cat] || 'gray'}">${cat}</span>`;
}
function fixedCatBadge(cat) {
  const map = {
    '家賃': '', '保険料': 'green', 'リース': 'blue',
    '税金・社保': 'yellow', 'ローン': 'yellow', 'その他': 'gray'
  };
  return `<span class="cat-badge ${map[cat] || 'gray'}">${cat}</span>`;
}

// ── スタッフ名リスト（オートコンプリート用） ────────
async function loadStaffNames() {
  const { data } = await supabase
    .from('anella_salary')
    .select('staff_name')
    .order('staff_name');
  if (!data) return;
  const names = [...new Set(data.map(d => d.staff_name))];
  const dl = document.getElementById('staffNameList');
  dl.innerHTML = names.map(n => `<option value="${n}">`).join('');
}

// ── 月次サマリー ──────────────────────────────────
async function loadSummary() {
  if (!currentMonth) return;
  showLoading();
  const { start, end } = getMonthRange(currentMonth);

  const [incRes, expRes, salRes, fixRes] = await Promise.all([
    supabase.from('anella_income').select('category, amount').gte('income_date', start).lte('income_date', end),
    supabase.from('anella_expense').select('category, amount').gte('expense_date', start).lte('expense_date', end),
    supabase.from('anella_salary').select('amount').eq('year_month', currentMonth),
    supabase.from('anella_fixed_cost').select('category, amount').eq('year_month', currentMonth),
  ]);

  hideLoading();

  const incomes  = incRes.data  || [];
  const expenses = expRes.data  || [];
  const salaries = salRes.data  || [];
  const fixeds   = fixRes.data  || [];

  const totalIncome  = incomes.reduce((s, r) => s + (r.amount || 0), 0);
  const totalExpense = expenses.reduce((s, r) => s + (r.amount || 0), 0);
  const totalSalary  = salaries.reduce((s, r) => s + (r.amount || 0), 0);
  const totalFixed   = fixeds.reduce((s, r) => s + (r.amount || 0), 0);
  const profit       = totalIncome - totalExpense - totalSalary - totalFixed;

  // サマリーカード
  document.getElementById('summaryIncome').textContent  = fmt(totalIncome);
  document.getElementById('summaryExpense').textContent = fmt(totalExpense);
  document.getElementById('summarySalary').textContent  = fmt(totalSalary);

  const profitEl = document.getElementById('summaryProfit');
  profitEl.textContent = fmt(profit);
  profitEl.className = 'sum-card-value ' + (profit >= 0 ? 'profit-plus' : 'profit-minus');

  // 収入チャート（カテゴリ別）
  const incomeByCategory = {};
  incomes.forEach(r => {
    incomeByCategory[r.category] = (incomeByCategory[r.category] || 0) + r.amount;
  });

  // 経費チャート（カテゴリ別）
  const expenseByCategory = {};
  expenses.forEach(r => {
    expenseByCategory[r.category] = (expenseByCategory[r.category] || 0) + r.amount;
  });

  renderPieChart('incomeChart', incomeByCategory, [
    '#4A7C6F', '#C96A3B', '#5C6BC0'
  ], incomeChartInstance, inst => { incomeChartInstance = inst; });

  renderPieChart('expenseChart', expenseByCategory, [
    '#C96A3B', '#4A7C6F', '#F57F17', '#5C6BC0', '#E91E63', '#9C27B0', '#9E9E9E'
  ], expenseChartInstance, inst => { expenseChartInstance = inst; });

  // 詳細内訳テーブル
  const tbody = document.getElementById('summaryDetailTable');
  const rows = [];

  rows.push(`<tr style="background:#F0F8F6;"><td colspan="3" style="font-weight:700; color:var(--accent); padding:10px;">収入</td></tr>`);
  Object.entries(incomeByCategory).forEach(([cat, amt]) => {
    const pct = totalIncome > 0 ? Math.round(amt / totalIncome * 100) : 0;
    rows.push(`<tr><td class="category" style="padding-left:20px;">${cat}</td><td class="amount">${fmt(amt)}</td><td class="right" style="color:var(--text-soft); font-size:12px;">${pct}%</td></tr>`);
  });
  rows.push(`<tr style="font-weight:700;"><td style="padding-left:20px; color:var(--text-mid);">合計</td><td class="amount" style="color:var(--accent);">${fmt(totalIncome)}</td><td></td></tr>`);

  rows.push(`<tr style="background:#FFF3EE;"><td colspan="3" style="font-weight:700; color:var(--primary); padding:10px;">経費</td></tr>`);
  Object.entries(expenseByCategory).forEach(([cat, amt]) => {
    const pct = totalExpense > 0 ? Math.round(amt / totalExpense * 100) : 0;
    rows.push(`<tr><td class="category" style="padding-left:20px;">${cat}</td><td class="amount">${fmt(amt)}</td><td class="right" style="color:var(--text-soft); font-size:12px;">${pct}%</td></tr>`);
  });
  rows.push(`<tr style="font-weight:700;"><td style="padding-left:20px; color:var(--text-mid);">合計</td><td class="amount" style="color:var(--primary);">${fmt(totalExpense)}</td><td></td></tr>`);

  rows.push(`<tr style="background:#EEF2FF;"><td colspan="3" style="font-weight:700; color:#5C6BC0; padding:10px;">給与</td></tr>`);
  rows.push(`<tr><td style="padding-left:20px; color:var(--text-mid);">給与合計</td><td class="amount" style="color:#5C6BC0;">${fmt(totalSalary)}</td><td></td></tr>`);

  rows.push(`<tr style="background:#FFF8E1;"><td colspan="3" style="font-weight:700; color:#F57F17; padding:10px;">固定費</td></tr>`);
  const fixedByCategory = {};
  fixeds.forEach(r => { fixedByCategory[r.category] = (fixedByCategory[r.category] || 0) + r.amount; });
  Object.entries(fixedByCategory).forEach(([cat, amt]) => {
    rows.push(`<tr><td class="category" style="padding-left:20px;">${cat}</td><td class="amount">${fmt(amt)}</td><td></td></tr>`);
  });
  rows.push(`<tr style="font-weight:700;"><td style="padding-left:20px; color:var(--text-mid);">合計</td><td class="amount" style="color:#F57F17;">${fmt(totalFixed)}</td><td></td></tr>`);

  rows.push(`<tr style="background:${profit >= 0 ? '#E8F5E9' : '#FFF3EE'}; border-top: 2px solid var(--border);">
    <td colspan="3" style="font-weight:700; color:${profit >= 0 ? 'var(--accent)' : 'var(--warn)'}; padding:12px; font-size:15px;">
      当月利益：${fmt(profit)}
    </td>
  </tr>`);

  tbody.innerHTML = rows.join('');
}

function renderPieChart(canvasId, data, colors, existingInstance, setInstance) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  if (existingInstance) {
    existingInstance.destroy();
  }

  const labels = Object.keys(data);
  const values = Object.values(data);

  if (labels.length === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#A88870';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('データなし', canvas.width / 2, canvas.height / 2);
    setInstance(null);
    return;
  }

  const inst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors.slice(0, labels.length),
        borderWidth: 2,
        borderColor: '#FFFAF4',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { family: 'Noto Sans JP', size: 11 },
            color: '#6B4F3A',
            padding: 10,
          }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const val = context.parsed;
              const total = context.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total > 0 ? Math.round(val / total * 100) : 0;
              return ` ¥${val.toLocaleString('ja-JP')} (${pct}%)`;
            }
          }
        }
      }
    }
  });
  setInstance(inst);
}

// ── 売上 ──────────────────────────────────────────
async function loadIncome() {
  if (!currentMonth) return;
  const { start, end } = getMonthRange(currentMonth);
  const { data, error } = await supabase
    .from('anella_income')
    .select('*')
    .gte('income_date', start)
    .lte('income_date', end)
    .order('income_date', { ascending: false });

  const tbody = document.getElementById('incomeTable');
  if (error || !data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="no-data">この月の売上データはありません</td></tr>`;
    document.getElementById('incomeMonthTotal').textContent = '¥0';
    return;
  }

  const total = data.reduce((s, r) => s + (r.amount || 0), 0);
  document.getElementById('incomeMonthTotal').textContent = fmt(total);

  tbody.innerHTML = data.map(r => {
    const badges = [];
    if (r.payment_cash  > 0) badges.push(`<span class="pay-badge cash">現金 ${fmt(r.payment_cash)}</span>`);
    if (r.payment_card  > 0) badges.push(`<span class="pay-badge card">カード ${fmt(r.payment_card)}</span>`);
    if (r.payment_emoney > 0) badges.push(`<span class="pay-badge emoney">電子 ${fmt(r.payment_emoney)}</span>`);
    return `
    <tr>
      <td style="white-space:nowrap;">${r.income_date}</td>
      <td>${incomeCatBadge(r.category)}</td>
      <td class="amount">${fmt(r.amount)}</td>
      <td><div class="pay-badges">${badges.join('') || '<span style="color:var(--text-soft);font-size:12px;">-</span>'}</div></td>
      <td class="memo">${r.memo || ''}</td>
      <td><button class="del-btn" onclick="deleteIncome('${r.id}')">削除</button></td>
    </tr>`;
  }).join('');
}

async function addIncome() {
  const date    = document.getElementById('incDate').value;
  const cat     = document.getElementById('incCategory').value;
  const amount  = parseInt(document.getElementById('incAmount').value) || 0;
  const cash    = parseInt(document.getElementById('incCash').value)   || 0;
  const card    = parseInt(document.getElementById('incCard').value)   || 0;
  const emoney  = parseInt(document.getElementById('incEmoney').value) || 0;
  const memo    = document.getElementById('incMemo').value.trim();

  if (!date)   { alert('日付を入力してください'); return; }
  if (amount <= 0) { alert('金額を入力してください'); return; }

  const btn = document.getElementById('incAddBtn');
  btn.disabled = true;

  const { error } = await supabase.from('anella_income').insert({
    income_date: date,
    category: cat,
    amount,
    payment_cash: cash || null,
    payment_card: card || null,
    payment_emoney: emoney || null,
    memo: memo || null,
  });

  btn.disabled = false;
  if (error) { alert('追加に失敗しました: ' + error.message); return; }

  document.getElementById('incAmount').value = '';
  document.getElementById('incCash').value   = '';
  document.getElementById('incCard').value   = '';
  document.getElementById('incEmoney').value = '';
  document.getElementById('incMemo').value   = '';
  loadIncome();
}

async function deleteIncome(id) {
  if (!confirm('この売上データを削除してもよいですか？')) return;
  const { error } = await supabase.from('anella_income').delete().eq('id', id);
  if (error) { alert('削除に失敗しました'); return; }
  loadIncome();
}

async function addFixed() {
  const cat    = document.getElementById('fixCategory').value;
  const amount = parseInt(document.getElementById('fixAmount').value) || 0;
  const memo   = document.getElementById('fixMemo').value.trim();

  if (amount <= 0) { alert('金額を入力してください'); return; }

  const btn = document.getElementById('fixAddBtn');
  btn.disabled = true;

  const { error } = await supabase.from('anella_fixed_cost').insert({
    year_month: currentMonth,
    category: cat,
    amount,
    memo: memo || null,
  });

  btn.disabled = false;
  if (error) { alert('追加に失敗しました: ' + error.message); return; }

  document.getElementById('fixAmount').value = '';
  document.getElementById('fixMemo').value   = '';
  loadFixed();
}

async function deleteFixed(id) {
  if (!confirm('この固定費データを削除してもよいですか？')) return;
  const { error } = await supabase.from('anella_fixed_cost').delete().eq('id', id);
  if (error) { alert('削除に失敗しました'); return; }
  loadFixed();
}
