<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アネラカフェ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF6EE;
    --surface: #FFFAF4;
    --primary: #C96A3B;
    --primary-light: #E8946A;
    --accent: #4A7C6F;
    --text: #2C1F14;
    --text-mid: #6B4F3A;
    --text-soft: #A88870;
    --border: #E8D5C0;
    --shadow: rgba(150,80,30,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 15%, rgba(201,106,59,0.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 85%, rgba(74,124,111,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    color: var(--primary);
    letter-spacing: 0.04em;
  }
  .header p {
    margin-top: 8px;
    color: var(--text-mid);
    font-size: 14px;
  }
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .section h2 {
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    transition: all 0.15s ease;
  }
  .link-card:hover {
    border-color: var(--primary-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .link-card .label {
    font-weight: 500;
  }
  .link-card .arrow {
    color: var(--primary);
    font-size: 18px;
  }
  .link-card.featured {
    background: linear-gradient(135deg, #C96A3B 0%, #E8946A 100%);
    border: none;
    color: #FFFAF4;
  }
  .link-card.featured .arrow {
    color: #FFFAF4;
  }
  .link-card.featured .label {
    font-weight: 700;
    font-size: 16px;
  }
  .link-card.accent {
    background: linear-gradient(135deg, #4A7C6F 0%, #6FA898 100%);
    border: none;
    color: #FFFAF4;
  }
  .link-card.accent .arrow {
    color: #FFFAF4;
  }
  .link-card.accent .label {
    font-weight: 700;
    font-size: 16px;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    color: var(--text-soft);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ANELLA CAFE</h1>
    <p>入場管理システム</p>
  </div>

  <div class="section">
    <h2>メイン</h2>
    <div class="links">
      <a class="link-card featured" href="anella-cafe-timer_13.html">
        <span class="label">入場管理タイマー（最新版）</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card accent" href="consent.html">
        <span class="label">同意書</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <div class="section">
    <h2>過去バージョン</h2>
    <div class="links">
      <a class="link-card" href="timer12.html">
        <span class="label">タイマー v12</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_11.html">
        <span class="label">タイマー v11</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_10.html">
        <span class="label">タイマー v10</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_9.html">
        <span class="label">タイマー v9</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_6.html">
        <span class="label">タイマー v6</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_3.html">
        <span class="label">タイマー v3</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-card" href="anella-cafe-timer_1.html">
        <span class="label">タイマー v1</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <div class="footer">
    © ANELLA CAFE
  </div>
</div>
</body>
</html>
