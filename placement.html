<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタッフ配置 | ANELLA CAFE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
  --bg: #EFF6FF;
  --surface: #FFFFFF;
  --primary: #2563EB;
  --primary-light: #93C5FD;
  --primary-grad: linear-gradient(135deg, #1D4ED8 0%, #4F46E5 100%);
  --accent: #7C3AED;
  --text: #1E3A5F;
  --text-mid: #4B6CB7;
  --text-soft: #94A3B8;
  --border: #BFDBFE;
  --shadow: rgba(37,99,235,0.10);
  --shadow-md: rgba(37,99,235,0.16);
  /* areas */
  --a-color: #EC4899; --a-bg: #FDF2F8; --a-border: #FBCFE8;
  --b-color: #059669; --b-bg: #ECFDF5; --b-border: #A7F3D0;
  --c-color: #7C3AED; --c-bg: #F5F3FF; --c-border: #DDD6FE;
  --off-color: #94A3B8; --off-bg: #F8FAFC;
  --un-color: #6366F1; --un-bg: #EEF2FF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh;}

/* ===== HEADER ===== */
.top-bar{
  background:var(--primary-grad);color:#fff;
  padding:10px 16px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:0 2px 12px rgba(37,99,235,0.30);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{font-family:'DM Serif Display',serif;font-size:1.2rem;letter-spacing:.04em;}
.brand-sub{font-size:.68rem;opacity:.8;letter-spacing:.08em;display:block;}
.date-nav{display:flex;align-items:center;gap:6px;}
.date-label{font-size:.9rem;font-weight:700;min-width:140px;text-align:center;}
.btn-ghost{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:3px 10px;cursor:pointer;font-size:.78rem;transition:.15s;}
.btn-ghost:hover{background:rgba(255,255,255,.28);}
.view-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.2);}
.view-btn{border:none;background:none;color:rgba(255,255,255,.75);padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;display:flex;align-items:center;gap:4px;}
.view-btn.active{background:#fff;color:#1D4ED8;font-weight:700;}
.top-right{margin-left:auto;display:flex;gap:8px;}

/* ===== BOARD ===== */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px;align-items:start;}
@media(max-width:800px){.board{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.board{grid-template-columns:1fr;}}

.area-col{border-radius:18px;padding:12px;transition:.15s;min-height:200px;}
.area-col.drag-over{outline:2px dashed var(--primary);outline-offset:2px;}
.area-col-header{font-size:.75rem;font-weight:700;letter-spacing:.06em;padding:7px 12px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;color:#fff;}
.area-count{font-size:.7rem;font-weight:700;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:99px;}

.col-unassigned{background:var(--un-bg);border:1.5px solid #C7D2FE;}
.col-unassigned .area-col-header{background:var(--un-color);}
.col-A{background:var(--a-bg);border:1.5px solid var(--a-border);}
.col-A .area-col-header{background:linear-gradient(135deg,#EC4899,#F472B6);}
.col-B{background:var(--b-bg);border:1.5px solid var(--b-border);}
.col-B .area-col-header{background:linear-gradient(135deg,#059669,#34D399);}
.col-C{background:var(--c-bg);border:1.5px solid var(--c-border);}
.col-C .area-col-header{background:linear-gradient(135deg,#7C3AED,#A78BFA);}

/* ===== STAFF CARD ===== */
.staff-card{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow);transition:.15s;border:1px solid #E2E8FF;}
.staff-card:hover{box-shadow:0 4px 16px var(--shadow-md);transform:translateY(-1px);}
.staff-card.dragging{opacity:.5;}
.staff-card-header{display:flex;align-items:center;gap:8px;padding:10px 12px 6px;}
.staff-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.8);box-shadow:0 0 0 1px rgba(0,0,0,.08);}
.staff-name{font-weight:700;font-size:.9rem;flex:1;color:var(--text);}
.shift-badge{font-size:.7rem;color:var(--text-mid);background:var(--bg);border-radius:6px;padding:2px 7px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;border:1px solid var(--border);transition:.12s;}
.shift-badge:hover{background:#DBEAFE;}
.shift-badge.no-time{color:var(--text-soft);border-style:dashed;}

/* ===== SLOT SECTIONS ===== */
.slot-section{padding:5px 10px 8px;}
.slot-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.slot-lbl{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0;letter-spacing:.04em;}
.slot-lbl.am{background:#DBEAFE;color:#1D4ED8;}
.slot-lbl.pm{background:#EDE9FE;color:#6D28D9;}
.slot-area-btn{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px;border:none;cursor:pointer;color:#fff;transition:.12s;}
.slot-area-btn:hover{opacity:.85;transform:scale(1.03);}
.slot-area-none{font-size:.7rem;color:var(--text-soft);padding:2px 10px;border:1.5px dashed var(--border);border-radius:99px;cursor:pointer;background:none;transition:.12s;}
.slot-area-none:hover{border-color:var(--primary);color:var(--primary);}
.slot-divider{border:none;border-top:1px dashed #E2E8FF;margin:2px 8px;}

/* ===== TASKS ===== */
.task-panel{padding:0 2px;}
.task-item{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:7px;transition:.1s;}
.task-item:hover{background:#F8FAFF;}
.task-item label{font-size:.77rem;color:var(--text-mid);cursor:pointer;flex:1;}
.task-item input[type=checkbox]{accent-color:var(--primary);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.task-item.checked label{color:var(--primary);font-weight:600;}
.task-empty{font-size:.74rem;color:var(--text-soft);padding:3px 0;text-align:center;}

/* ===== WEEK VIEW ===== */
.week-section{padding:16px;}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.week-nav .wk-lbl{font-size:.95rem;font-weight:700;color:var(--text);flex:1;text-align:center;}
.week-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);}
.week-card table{width:100%;border-collapse:collapse;}
.week-card thead th{background:var(--primary-grad);color:#fff;font-size:.75rem;font-weight:700;padding:10px 6px;text-align:center;}
.week-card thead th.today-col{background:rgba(255,255,255,.25);}
.week-card tbody td{border-bottom:1px solid #F0F4FF;padding:7px 5px;vertical-align:top;}
.week-card tbody tr:last-child td{border-bottom:none;}
.week-staff-cell{font-weight:700;font-size:.8rem;display:flex;align-items:center;gap:5px;white-space:nowrap;padding:0 4px;}
.week-slot-cell{min-height:36px;}
.week-chip{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin:1px 1px;color:#fff;}
.wc-A{background:var(--a-color);}
.wc-B{background:var(--b-color);}
.wc-C{background:var(--c-color);}
.wc-off{background:#CBD5E1;color:#fff;}
.wc-none{background:#EEF2FF;color:#6366F1;font-size:.62rem;}
.wk-today{background:#EFF6FF;}

/* ===== MONTH VIEW ===== */
.month-section{padding:16px;}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.month-nav .mo-lbl{font-size:1.05rem;font-weight:900;color:var(--text);flex:1;text-align:center;}
.month-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);}
.month-card table{width:100%;border-collapse:collapse;}
.month-card thead th{background:var(--primary-grad);color:#fff;font-size:.75rem;font-weight:700;padding:10px 4px;text-align:center;}
.month-card tbody td{border:1px solid #EEF2FF;vertical-align:top;min-height:80px;padding:5px;cursor:pointer;transition:.12s;}
.month-card tbody td:hover{background:#F0F7FF;}
.month-card tbody td.today-cell{background:#EFF6FF;border:1.5px solid var(--primary);}
.month-card tbody td.other-month{background:#F8FAFC;}
.mo-day-num{font-size:.72rem;font-weight:700;color:var(--text-mid);margin-bottom:3px;}
.mo-day-num.sun{color:#EF4444;}
.mo-day-num.sat{color:#2563EB;}
.mo-staff-chip{font-size:.63rem;font-weight:600;padding:1px 5px;border-radius:4px;display:flex;align-items:center;gap:2px;margin:1px 0;white-space:nowrap;overflow:hidden;}
.mo-staff-chip.area-A{background:var(--a-bg);color:var(--a-color);border:1px solid var(--a-border);}
.mo-staff-chip.area-B{background:var(--b-bg);color:var(--b-color);border:1px solid var(--b-border);}
.mo-staff-chip.area-C{background:var(--c-bg);color:var(--c-color);border:1px solid var(--c-border);}
.mo-staff-chip.area-none{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0;}
.mo-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,58,95,.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:24px;width:90%;max-width:420px;max-height:87vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(37,99,235,.2);}
.modal-title{font-size:1rem;font-weight:900;color:var(--text);margin-bottom:14px;}
.area-option{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;cursor:pointer;border:2px solid transparent;margin-bottom:7px;transition:.12s;}
.area-option:hover{border-color:var(--border);}
.area-option.sel-A{border-color:var(--a-color);background:var(--a-bg);}
.area-option.sel-B{border-color:var(--b-color);background:var(--b-bg);}
.area-option.sel-C{border-color:var(--c-color);background:var(--c-bg);}
.area-option.sel-off{border-color:var(--off-color);background:var(--off-bg);}
.area-option-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.area-option-lbl{font-weight:700;font-size:.88rem;color:var(--text);}
.modal-task-title{font-size:.75rem;font-weight:700;color:var(--text-soft);letter-spacing:.07em;margin:14px 0 8px;}
.btn-primary-blue{background:var(--primary-grad);color:#fff;border:none;border-radius:12px;padding:11px 0;width:100%;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;}
.btn-primary-blue:hover{opacity:.9;}
.btn-outline-del{background:none;border:1.5px solid #FECACA;color:#EF4444;border-radius:12px;padding:11px 16px;font-size:.85rem;cursor:pointer;font-weight:600;}

/* ===== SETTINGS ===== */
.settings-section{margin-bottom:20px;}
.settings-ttl{font-size:.73rem;font-weight:700;color:var(--text-soft);letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.staff-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);}
.color-dot-sm{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #CBD5E1;flex-shrink:0;}
.task-item-sm{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;font-size:.82rem;border:1px solid var(--border);}
.btn-del-sm{background:none;border:none;color:#EF4444;cursor:pointer;padding:2px 4px;font-size:.85rem;}
.add-row{display:flex;gap:8px;margin-top:8px;}
.input-sm{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:.82rem;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:#fff;outline:none;transition:.15s;}
.input-sm:focus{border-color:var(--primary);}
.btn-add-sm{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;}

/* ===== SHIFT MODAL ===== */
.shift-table-wrap{overflow-x:auto;}
.shift-table-wrap table{border-collapse:collapse;font-size:.75rem;}
.shift-table-wrap th{background:#EEF2FF;color:var(--primary);font-weight:700;padding:6px 5px;text-align:center;min-width:90px;}
.shift-table-wrap td{padding:4px 3px;border-bottom:1px solid #F0F4FF;}
.shift-input{width:62px;font-size:.7rem;padding:3px 4px;border:1.5px solid var(--border);border-radius:5px;text-align:center;font-family:'Noto Sans JP',sans-serif;}
.shift-input:focus{border-color:var(--primary);outline:none;}

/* ===== INLINE SHIFT FORM ===== */
.shift-inline-form{position:absolute;z-index:300;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;box-shadow:0 8px 24px var(--shadow-md);display:flex;flex-direction:column;gap:8px;min-width:200px;}

/* ===== FAB ===== */
.fab{position:fixed;bottom:22px;right:18px;background:var(--primary-grad);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;z-index:90;transition:.15s;}
.fab:hover{transform:scale(1.05);}

@media(max-width:600px){.date-label{min-width:110px;font-size:.82rem;}.top-bar{gap:8px;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="brand">
    <div>
      <div class="brand-logo">🐾 ANELLA CAFE</div>
      <span class="brand-sub">STAFF PLACEMENT</span>
    </div>
  </div>
  <div class="date-nav">
    <button class="btn-ghost" onclick="navPrev()"><i class="bi bi-chevron-left"></i></button>
    <span class="date-label" id="navLabel"></span>
    <button class="btn-ghost" onclick="navNext()"><i class="bi bi-chevron-right"></i></button>
    <button class="btn-ghost" onclick="navToday()">今日</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="vDay"   onclick="setView('day')">  <i class="bi bi-layout-three-columns"></i> 日</button>
    <button class="view-btn"        id="vWeek"  onclick="setView('week')"> <i class="bi bi-calendar-week"></i> 週</button>
    <button class="view-btn"        id="vMonth" onclick="setView('month')"><i class="bi bi-calendar-month"></i> 月</button>
  </div>
  <div class="top-right">
    <button class="btn-ghost" onclick="openShiftModal()"><i class="bi bi-table me-1"></i>シフト入力</button>
    <button class="btn-ghost" onclick="openSettings()"><i class="bi bi-gear-fill"></i></button>
  </div>
</div>

<!-- DAY VIEW -->
<div id="viewDay">
  <div class="board">
    <div class="area-col col-unassigned" ondragover="event.preventDefault()" ondrop="dropCard(event,'')">
      <div class="area-col-header"><span>🔷 未割当</span><span class="area-count" id="cnt-unassigned">0</span></div>
      <div id="cards-unassigned"></div>
    </div>
    <div class="area-col col-A" ondragover="event.preventDefault()" ondrop="dropCard(event,'A')">
      <div class="area-col-header"><span>🌸 A. ふれあい</span><span class="area-count" id="cnt-A">0</span></div>
      <div id="cards-A"></div>
    </div>
    <div class="area-col col-B" ondragover="event.preventDefault()" ondrop="dropCard(event,'B')">
      <div class="area-col-header"><span>💼 B. 多目的室</span><span class="area-count" id="cnt-B">0</span></div>
      <div id="cards-B"></div>
    </div>
    <div class="area-col col-C" ondragover="event.preventDefault()" ondrop="dropCard(event,'C')">
      <div class="area-col-header"><span>✨ C. 兼任</span><span class="area-count" id="cnt-C">0</span></div>
      <div id="cards-C"></div>
    </div>
  </div>
</div>

<!-- WEEK VIEW -->
<div id="viewWeek" style="display:none" class="week-section">
  <div class="week-nav">
    <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftWeekView(-1)"><i class="bi bi-chevron-left"></i></button>
    <span class="wk-lbl" id="weekRangeLabel"></span>
    <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftWeekView(1)"><i class="bi bi-chevron-right"></i></button>
  </div>
  <div class="week-card">
    <table>
      <thead><tr>
        <th style="min-width:80px;">スタッフ</th>
        <th id="wh0"></th><th id="wh1"></th><th id="wh2"></th>
        <th id="wh3"></th><th id="wh4"></th><th id="wh5"></th>
      </tr></thead>
      <tbody id="weekBody"></tbody>
    </table>
  </div>
</div>

<!-- MONTH VIEW -->
<div id="viewMonth" style="display:none" class="month-section">
  <div class="month-nav">
    <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftMonthView(-1)"><i class="bi bi-chevron-left"></i></button>
    <span class="mo-lbl" id="monthLabel"></span>
    <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftMonthView(1)"><i class="bi bi-chevron-right"></i></button>
  </div>
  <div class="month-card">
    <table>
      <thead><tr>
        <th style="color:#EF4444;">日</th>
        <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
        <th style="color:#93C5FD;">土</th>
      </tr></thead>
      <tbody id="monthBody"></tbody>
    </table>
  </div>
</div>

<!-- ASSIGNMENT MODAL -->
<div class="modal-overlay" id="assignModal">
  <div class="modal-box">
    <div class="d-flex align-items-center justify-content-between" style="margin-bottom:14px;">
      <div class="modal-title" id="assignModalTitle">配置設定</div>
      <button style="background:none;border:none;font-size:1.1rem;color:var(--text-soft);cursor:pointer;" onclick="closeAssignModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="areaOptions"></div>
    <div id="modalTaskSection" style="display:none;">
      <div class="modal-task-title">仕事内容（チェック）</div>
      <div id="modalTasks"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn-primary-blue" onclick="saveAssignment()"><i class="bi bi-check2 me-1"></i>保存</button>
      <button class="btn-outline-del" onclick="removeAssignment()"><i class="bi bi-x"></i>解除</button>
    </div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div class="modal-overlay" id="shiftModal">
  <div class="modal-box" style="max-width:700px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="modal-title">📅 週間シフト入力</div>
      <button style="background:none;border:none;font-size:1.1rem;color:var(--text-soft);cursor:pointer;" onclick="closeShiftModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <p style="font-size:.78rem;color:var(--text-soft);margin-bottom:12px;">出勤時間を入力（例: 9:00 〜 17:00）</p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftWeekShift(-1)"><i class="bi bi-chevron-left"></i></button>
      <span style="font-size:.88rem;font-weight:700;color:var(--text);flex:1;text-align:center;" id="shiftWeekLabel"></span>
      <button class="btn-ghost" style="color:var(--primary);border-color:var(--border);background:#fff;" onclick="shiftWeekShift(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div class="shift-table-wrap">
      <table>
        <thead><tr>
          <th style="min-width:80px;">スタッフ</th>
          <th id="sh0"></th><th id="sh1"></th><th id="sh2"></th>
          <th id="sh3"></th><th id="sh4"></th><th id="sh5"></th>
        </tr></thead>
        <tbody id="shiftWeekBody"></tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
      <button class="btn-ghost" style="color:var(--text-mid);border-color:var(--border);background:#fff;" onclick="closeShiftModal()">キャンセル</button>
      <button class="btn-primary-blue" style="width:auto;padding:10px 24px;" onclick="saveShiftWeek()"><i class="bi bi-save me-1"></i>保存</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">

<script>
// ================================================================
// Supabase
// ================================================================
const SUPABASE_URL = 'https://abeekodehorlwsmnhoza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZWVrb2RlaG9ybHdzbW5ob3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzAzMTksImV4cCI6MjA5Mjc0NjMxOX0.ZgOB2TUuBBRNV8pejae_UOX9kXIiFb-CS7X0alRX1uU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AREA = {
  A:{ label:'A. ふれあい', color:'#EC4899', cls:'A' },
  B:{ label:'B. 多目的室', color:'#059669', cls:'B' },
  C:{ label:'C. 兼任',     color:'#7C3AED', cls:'C' },
  '休み':{ label:'休み',   color:'#94A3B8', cls:'off' },
};
const DOW = ['日','月','火','水','木','金','土'];
const COLORS = ['#3B82F6','#EC4899','#10B981','#F59E0B','#8B5CF6','#14B8A6','#F97316','#06B6D4','#6366F1','#84CC16'];

// ================================================================
// State
// ================================================================
let currentDate  = new Date();
let currentView  = 'day';
let weekViewBase = new Date(); // for week view navigation
let monthViewDate= new Date(); // for month view navigation
let staffList    = [];
let taskList     = [];
let assignments  = [];
let taskChecks   = {};
let shifts       = {};
let weekAsgn     = [];
let weekShifts   = [];
let monthAsgn    = [];
let monthShifts  = [];
let dragStaffId  = null;
let editingStaffId = null;
let editingAreaCode= null;
let editingAssignmentId = null;
let editingSlot  = '午前';
let lastOwnWrite = 0;
let isLoadingDay = false;
let shiftWeekBase = new Date();
let shiftWeekDays = [];
let realtimeDebounce = null;

// ================================================================
// Helpers
// ================================================================
const dateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseNum = v => typeof v==='number'?v:(typeof v==='string'?parseFloat(v.replace(/,/g,''))||0:0);

function dayLabel(d) {
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
}
function getMondayOfWeek(d) {
  const c = new Date(d);
  const day = c.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  c.setDate(c.getDate() + diff);
  return c;
}
function getWeekDays(mon) {
  return Array.from({length:6}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

// ================================================================
// Navigation
// ================================================================
function navPrev() {
  if (currentView === 'day')   { currentDate  = new Date(currentDate);  currentDate.setDate(currentDate.getDate()-1); loadDay(); }
  if (currentView === 'week')  { shiftWeekView(-1); }
  if (currentView === 'month') { shiftMonthView(-1); }
}
function navNext() {
  if (currentView === 'day')   { currentDate  = new Date(currentDate);  currentDate.setDate(currentDate.getDate()+1); loadDay(); }
  if (currentView === 'week')  { shiftWeekView(1); }
  if (currentView === 'month') { shiftMonthView(1); }
}
function navToday() {
  currentDate = new Date();
  weekViewBase = getMondayOfWeek(new Date());
  monthViewDate = new Date();
  if (currentView === 'day')   loadDay();
  if (currentView === 'week')  loadWeekView();
  if (currentView === 'month') loadMonthView();
}
function setView(v) {
  currentView = v;
  ['day','week','month'].forEach(n => {
    document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1)).style.display = n===v?'':'none';
    document.getElementById('v'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active', n===v);
  });
  if (v==='day')   { updateNavLabel(); }
  if (v==='week')  loadWeekView();
  if (v==='month') loadMonthView();
}
function updateNavLabel() {
  const labels = { day: dayLabel(currentDate), week: '', month: '' };
  if (currentView === 'day') document.getElementById('navLabel').textContent = dayLabel(currentDate);
}

// ================================================================
// Init
// ================================================================
async function init() {
  weekViewBase  = getMondayOfWeek(currentDate);
  monthViewDate = new Date(currentDate);
  const [sf, tk] = await Promise.all([
    sb.from('placement_staff').select('*').eq('is_active',true).order('sort_order'),
    sb.from('placement_tasks').select('*').eq('is_active',true).order('sort_order')
  ]);
  staffList = sf.data || [];
  taskList  = tk.data || [];
  await loadDay();
  subscribeRealtime();
}

// ================================================================
// Day
// ================================================================
async function loadDay() {
  if (isLoadingDay) return;
  isLoadingDay = true;
  document.getElementById('navLabel').textContent = dayLabel(currentDate);
  const ds = dateStr(currentDate);
  const [asgnRes, shiftRes] = await Promise.all([
    sb.from('placement_assignments').select('*').eq('assignment_date',ds),
    sb.from('placement_shifts').select('*').eq('shift_date',ds)
  ]);
  assignments = asgnRes.data || [];
  shifts = {};
  (shiftRes.data||[]).forEach(s => { shifts[s.staff_id]={start:s.start_time,end:s.end_time,id:s.id}; });

  const ids = assignments.map(a=>a.id);
  if (Date.now()-lastOwnWrite > 3000) taskChecks = {};
  if (ids.length) {
    const {data:chks} = await sb.from('placement_task_checks').select('*').in('assignment_id',ids);
    (chks||[]).forEach(c => {
      if (!taskChecks[c.assignment_id]) taskChecks[c.assignment_id]=new Set();
      taskChecks[c.assignment_id].add(c.task_id);
    });
  }
  isLoadingDay = false;
  renderBoard();
}

function renderBoard() {
  const areaMap = { unassigned:[], A:[], B:[], C:[] };
  staffList.forEach(staff => {
    const amA = assignments.find(a=>a.staff_id===staff.id&&a.time_slot==='午前');
    const pmA = assignments.find(a=>a.staff_id===staff.id&&a.time_slot==='午後');
    const am  = amA?.area_code;
    const key = (am==='A'||am==='B'||am==='C') ? am : 'unassigned';
    areaMap[key].push(buildCard(staff, amA, pmA));
  });
  ['unassigned','A','B','C'].forEach(k => {
    const el = document.getElementById(`cards-${k}`);
    el.innerHTML = '';
    areaMap[k].forEach(c => el.appendChild(c));
    document.getElementById(`cnt-${k}`).textContent = areaMap[k].length;
  });
}

function buildSlotSection(staff, asgn, slot, taskArea) {
  const area = asgn?.area_code;
  const checks = asgn ? (taskChecks[asgn.id]||new Set()) : new Set();
  // タスク表示は taskArea（午前のエリア）を基準に統一
  const displayArea = taskArea || (area&&area!=='休み'?area:null);
  const areaTasks = displayArea ? taskList.filter(t=>t.area_code===displayArea) : [];
  const sc = slot==='午前'?'am':'pm';

  let btn;
  if (!area) {
    btn = `<button class="slot-area-none" onclick="event.stopPropagation();openAssignModalSlot('${staff.id}','${slot}')">＋割当</button>`;
  } else if (area==='休み') {
    btn = `<button class="slot-area-btn" style="background:#94A3B8;" onclick="event.stopPropagation();openAssignModalSlot('${staff.id}','${slot}')">🔴 休み</button>`;
  } else {
    btn = `<button class="slot-area-btn" style="background:${AREA[area].color};" onclick="event.stopPropagation();openAssignModalSlot('${staff.id}','${slot}')">${AREA[area].label}</button>`;
  }

  const taskHtml = areaTasks.map(t => {
    const chk = checks.has(t.id);
    return `<div class="task-item${chk?' checked':''}">
      <input type="checkbox" id="tc-${staff.id}-${slot}-${t.id}" ${chk?'checked':''}
        onchange="this.closest('.task-item').classList.toggle('checked',this.checked);toggleTaskSlot('${staff.id}','${t.id}','${displayArea}','${slot}',this.checked)">
      <label for="tc-${staff.id}-${slot}-${t.id}">${t.task_name}</label>
    </div>`;
  }).join('');

  return `<div class="slot-section">
    <div class="slot-row">
      <span class="slot-lbl ${sc}">${slot}</span>${btn}
    </div>
    ${taskHtml?`<div class="task-panel">${taskHtml}</div>`:''}
  </div>`;
}

function buildCard(staff, amAsgn, pmAsgn) {
  const div = document.createElement('div');
  div.className = 'staff-card';
  div.draggable = true;
  div.dataset.staffId = staff.id;
  div.addEventListener('dragstart', e => { dragStaffId=staff.id; div.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  const sh = shifts[staff.id];
  const tl = sh?.start&&sh?.end?`${sh.start}〜${sh.end}`:(sh?.start?sh.start+'〜':null);
  // 午前のエリアを基準にタスクを統一表示（午後も同じ項目）
  const amArea = amAsgn?.area_code && amAsgn.area_code !== '休み' ? amAsgn.area_code : null;
  const pmArea = pmAsgn?.area_code && pmAsgn.area_code !== '休み' ? pmAsgn.area_code : null;
  const taskArea = amArea || pmArea; // どちらかのエリアを使用

  div.innerHTML = `
    <div class="staff-card-header">
      <span class="staff-dot" style="background:${staff.color}"></span>
      <span class="staff-name">${staff.name}</span>
      <span class="shift-badge ${tl?'':'no-time'}" onclick="event.stopPropagation();editShiftInline('${staff.id}',this)">
        <i class="bi bi-clock" style="font-size:.65rem;"></i>${tl||'時間未入力'}
      </span>
    </div>
    <div style="border-top:1px solid #F0F4FF;">
      ${buildSlotSection(staff,amAsgn,'午前',taskArea)}
      <hr class="slot-divider">
      ${buildSlotSection(staff,pmAsgn,'午後',taskArea)}
    </div>`;
  return div;
}

// ================================================================
// Drag & Drop
// ================================================================
function dropCard(event, areaCode) {
  event.preventDefault();
  if (!dragStaffId) return;
  saveAreaDirectly(dragStaffId, areaCode||null, '午前');
  dragStaffId = null;
}
async function saveAreaDirectly(staffId, areaCode, slot) {
  const ds = dateStr(currentDate);
  const ex = assignments.find(a=>a.staff_id===staffId&&a.time_slot===slot);
  if (ex) {
    await sb.from('placement_assignments').update({area_code:areaCode||null,updated_at:new Date().toISOString()}).eq('id',ex.id);
  } else if (areaCode) {
    await sb.from('placement_assignments').insert({assignment_date:ds,staff_id:staffId,time_slot:slot,area_code:areaCode});
  }
  await loadDay();
}

// ================================================================
// Assignment Modal
// ================================================================
function openAssignModalSlot(staffId, slot) { editingSlot=slot; openAssignModal(staffId); }
function openAssignModal(staffId) {
  editingStaffId = staffId;
  const staff = staffList.find(s=>s.id===staffId);
  const asgn  = assignments.find(a=>a.staff_id===staffId&&a.time_slot===editingSlot);
  editingAssignmentId = asgn?.id||null;
  editingAreaCode = asgn?.area_code||null;
  document.getElementById('assignModalTitle').textContent = `${staff.name} ー ${editingSlot}`;
  document.getElementById('areaOptions').innerHTML = ['A','B','C','休み'].map(code => {
    const info = AREA[code];
    const sel = editingAreaCode===code?`sel-${info.cls}`:'';
    return `<div class="area-option ${sel}" onclick="selectArea('${code}')" id="opt-${code}">
      <div class="area-option-dot" style="background:${info.color}"></div>
      <div class="area-option-lbl">${info.label}</div>
    </div>`;
  }).join('');
  renderModalTasks(editingAreaCode, asgn?.id);
  document.getElementById('assignModal').classList.add('open');
}
function selectArea(code) {
  editingAreaCode = code;
  ['A','B','C','休み'].forEach(c => {
    const el = document.getElementById(`opt-${c}`);
    el.className = `area-option ${c===code?'sel-'+AREA[c].cls:''}`;
  });
  renderModalTasks(code, editingAssignmentId);
}
function renderModalTasks(areaCode, assignmentId) {
  const sec = document.getElementById('modalTaskSection');
  const div = document.getElementById('modalTasks');
  if (!areaCode||areaCode==='休み') { sec.style.display='none'; return; }
  sec.style.display='block';
  const checks = assignmentId ? (taskChecks[assignmentId]||new Set()) : new Set();
  const tasks = taskList.filter(t=>t.area_code===areaCode);
  div.innerHTML = tasks.map(t => `
    <div class="task-item${checks.has(t.id)?' checked':''}">
      <input type="checkbox" id="mt-${t.id}" ${checks.has(t.id)?'checked':''}>
      <label for="mt-${t.id}">${t.task_name}</label>
    </div>`).join('') || '<div class="task-empty">タスクなし</div>';
}
async function saveAssignment() {
  const ds = dateStr(currentDate);
  let aId = editingAssignmentId;
  if (aId) {
    await sb.from('placement_assignments').update({area_code:editingAreaCode,updated_at:new Date().toISOString()}).eq('id',aId);
  } else {
    const {data} = await sb.from('placement_assignments').insert({assignment_date:ds,staff_id:editingStaffId,time_slot:editingSlot,area_code:editingAreaCode}).select().single();
    aId = data?.id;
  }
  if (aId&&editingAreaCode&&editingAreaCode!=='休み') {
    await sb.from('placement_task_checks').delete().eq('assignment_id',aId);
    const tasks = taskList.filter(t=>t.area_code===editingAreaCode);
    const checked = tasks.filter(t=>document.getElementById(`mt-${t.id}`)?.checked);
    if (checked.length) await sb.from('placement_task_checks').insert(checked.map(t=>({assignment_id:aId,task_id:t.id})));
  }
  closeAssignModal();
  await loadDay();
}
async function removeAssignment() {
  if (editingAssignmentId) await sb.from('placement_assignments').delete().eq('id',editingAssignmentId);
  closeAssignModal();
  await loadDay();
}
function closeAssignModal() { document.getElementById('assignModal').classList.remove('open'); }

// ================================================================
// Task Toggle
// ================================================================
async function toggleTaskSlot(staffId, taskId, areaCode, slot, checked) {
  lastOwnWrite = Date.now();
  const ds = dateStr(currentDate);
  let asgn = assignments.find(a=>a.staff_id===staffId&&a.time_slot===slot);
  if (!asgn) {
    const {data} = await sb.from('placement_assignments').insert({assignment_date:ds,staff_id:staffId,time_slot:slot,area_code:areaCode}).select().single();
    asgn = data; if (!asgn) return;
    assignments.push(asgn);
  }
  if (!taskChecks[asgn.id]) taskChecks[asgn.id]=new Set();
  if (checked) {
    taskChecks[asgn.id].add(taskId);
    await sb.from('placement_task_checks').upsert({assignment_id:asgn.id,task_id:taskId},{onConflict:'assignment_id,task_id'});
  } else {
    taskChecks[asgn.id].delete(taskId);
    await sb.from('placement_task_checks').delete().eq('assignment_id',asgn.id).eq('task_id',taskId);
  }
  lastOwnWrite = Date.now();
}

// ================================================================
// Shift Inline Edit
// ================================================================
function editShiftInline(staffId, el) {
  document.querySelectorAll('.shift-inline-form').forEach(e=>e.remove());
  const sh = shifts[staffId]||{};
  const form = document.createElement('div');
  form.className = 'shift-inline-form';
  form.innerHTML = `
    <div style="font-size:.8rem;font-weight:700;color:var(--text);">⏰ 勤務時間</div>
    <div style="display:flex;align-items:center;gap:6px;">
      <input type="text" id="inS" value="${sh.start||''}" placeholder="9:00" style="width:68px;padding:5px 7px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;text-align:center;outline:none;">
      <span style="color:var(--text-soft);font-size:.8rem;">〜</span>
      <input type="text" id="inE" value="${sh.end||''}" placeholder="17:00" style="width:68px;padding:5px 7px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;text-align:center;outline:none;">
    </div>
    <div style="display:flex;gap:6px;">
      <button onclick="saveShiftInline('${staffId}')" style="flex:1;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:6px;font-size:.8rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">保存</button>
      <button onclick="this.closest('.shift-inline-form').remove()" style="background:var(--bg);color:var(--text-soft);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.8rem;cursor:pointer;">✕</button>
    </div>`;
  const rect = el.getBoundingClientRect();
  form.style.top  = (rect.bottom+window.scrollY+4)+'px';
  form.style.left = (rect.left+window.scrollX)+'px';
  document.body.appendChild(form);
  form.querySelector('#inS').focus();
}
async function saveShiftInline(staffId) {
  const start = document.getElementById('inS')?.value.trim();
  const end   = document.getElementById('inE')?.value.trim();
  const ds    = dateStr(currentDate);
  await sb.from('placement_shifts').upsert({shift_date:ds,staff_id:staffId,start_time:start||null,end_time:end||null},{onConflict:'shift_date,staff_id'});
  shifts[staffId] = {start,end};
  document.querySelectorAll('.shift-inline-form').forEach(e=>e.remove());
  renderBoard();
}

// ================================================================
// Week View
// ================================================================
function shiftWeekView(n) {
  weekViewBase = new Date(weekViewBase);
  weekViewBase.setDate(weekViewBase.getDate()+n*7);
  loadWeekView();
}
async function loadWeekView() {
  const days = getWeekDays(weekViewBase);
  const s = dateStr(days[0]), e = dateStr(days[5]);
  const [ar, sh] = await Promise.all([
    sb.from('placement_assignments').select('*').gte('assignment_date',s).lte('assignment_date',e),
    sb.from('placement_shifts').select('*').gte('shift_date',s).lte('shift_date',e)
  ]);
  weekAsgn = ar.data||[];
  weekShifts = sh.data||[];
  renderWeekView(days);
}
function renderWeekView(days) {
  const today = dateStr(new Date());
  const DOW_S = ['月','火','水','木','金','土'];
  days.forEach((d,i) => {
    const el = document.getElementById(`wh${i}`);
    const ds = dateStr(d);
    el.innerHTML = `${DOW_S[i]}<br><small style="font-weight:400;opacity:.8;">${d.getMonth()+1}/${d.getDate()}</small>`;
    if (ds===today) el.style.background='rgba(255,255,255,.3)';
  });
  const label = `${days[0].getMonth()+1}/${days[0].getDate()} 〜 ${days[5].getMonth()+1}/${days[5].getDate()}`;
  document.getElementById('weekRangeLabel').textContent = label;
  document.getElementById('navLabel').textContent = label;

  const tbody = document.getElementById('weekBody');
  tbody.innerHTML = staffList.map(staff => {
    const cells = days.map(d => {
      const ds = dateStr(d);
      const am = weekAsgn.find(a=>a.staff_id===staff.id&&a.assignment_date===ds&&a.time_slot==='午前');
      const pm = weekAsgn.find(a=>a.staff_id===staff.id&&a.assignment_date===ds&&a.time_slot==='午後');
      const sh = weekShifts.find(s=>s.staff_id===staff.id&&s.shift_date===ds);
      const chip = (a,lbl) => {
        if (!a) return `<span class="week-chip wc-none">${lbl}未定</span>`;
        if (a.area_code==='休み') return `<span class="week-chip wc-off">休み</span>`;
        return `<span class="week-chip wc-${a.area_code}">${a.area_code}</span>`;
      };
      const shiftTxt = sh?.start_time&&sh?.end_time?`<div style="font-size:.62rem;color:var(--text-soft);margin-bottom:2px;">${sh.start_time}〜${sh.end_time}</div>`:'';
      return `<td class="${ds===today?'wk-today':''}">
        <div class="week-slot-cell">
          ${shiftTxt}
          ${chip(am,'午前')}${chip(pm,'午後')}
        </div>
      </td>`;
    }).join('');
    return `<tr>
      <td><div class="week-staff-cell">
        <span style="width:9px;height:9px;border-radius:50%;background:${staff.color};display:inline-block;flex-shrink:0;"></span>
        ${staff.name}
      </div></td>${cells}
    </tr>`;
  }).join('');
}

// ================================================================
// Month View
// ================================================================
function shiftMonthView(n) {
  monthViewDate = new Date(monthViewDate.getFullYear(), monthViewDate.getMonth()+n, 1);
  loadMonthView();
}
async function loadMonthView() {
  const y = monthViewDate.getFullYear(), m = monthViewDate.getMonth();
  const first = new Date(y,m,1), last = new Date(y,m+1,0);
  const s = dateStr(first), e = dateStr(last);
  const [ar, sh] = await Promise.all([
    sb.from('placement_assignments').select('*').gte('assignment_date',s).lte('assignment_date',e),
    sb.from('placement_shifts').select('*').gte('shift_date',s).lte('shift_date',e)
  ]);
  monthAsgn   = ar.data||[];
  monthShifts = sh.data||[];
  renderMonthView(y, m, first, last);
}
function renderMonthView(y, m, first, last) {
  const label = `${y}年${m+1}月`;
  document.getElementById('monthLabel').textContent = label;
  document.getElementById('navLabel').textContent   = label;

  const today = dateStr(new Date());
  const startDow = first.getDay(); // 0=Sun
  const totalDays = last.getDate();
  const rows = [];
  let cells = [];
  // Leading empty cells
  for (let i=0;i<startDow;i++) cells.push({empty:true});
  for (let day=1;day<=totalDays;day++) {
    cells.push({day, date:new Date(y,m,day)});
    if (cells.length===7) { rows.push(cells); cells=[]; }
  }
  if (cells.length) { while(cells.length<7) cells.push({empty:true}); rows.push(cells); }

  // Build assignment map: date -> staffId -> [am,pm]
  const asgnMap = {};
  monthAsgn.forEach(a => {
    if (!asgnMap[a.assignment_date]) asgnMap[a.assignment_date]={};
    if (!asgnMap[a.assignment_date][a.staff_id]) asgnMap[a.assignment_date][a.staff_id]={am:null,pm:null};
    if (a.time_slot==='午前') asgnMap[a.assignment_date][a.staff_id].am=a.area_code;
    if (a.time_slot==='午後') asgnMap[a.assignment_date][a.staff_id].pm=a.area_code;
  });
  const shiftMap = {};
  monthShifts.forEach(s => { shiftMap[s.shift_date+'_'+s.staff_id]=s; });

  const dowCls = ['sun','','','','','','sat'];
  const tbody = document.getElementById('monthBody');
  tbody.innerHTML = rows.map(row => `<tr>${row.map(cell => {
    if (cell.empty) return `<td style="background:#F8FAFC;"></td>`;
    const ds = dateStr(cell.date);
    const isToday = ds===today;
    const dayAsgn = asgnMap[ds]||{};
    const stClass = `mo-day-num${cell.date.getDay()===0?' sun':cell.date.getDay()===6?' sat':''}`;

    // Show working staff
    const chips = staffList.filter(st => shiftMap[ds+'_'+st.id]).map(st => {
      const a = dayAsgn[st.id];
      const am = a?.am, pm = a?.pm;
      const area = am||pm||null;
      const cls = area&&area!=='休み'?`area-${area}`:'area-none';
      const dot = `<span class="mo-dot" style="background:${st.color}"></span>`;
      const aLabel = area&&area!=='休み'?area:'--';
      return `<div class="mo-staff-chip ${cls}" title="${st.name}: 午前${am||'?'} 午後${pm||'?'}">${dot}${st.name}<small style="opacity:.7;"> ${aLabel}</small></div>`;
    }).join('');

    return `<td class="${isToday?'today-cell':''}" onclick="jumpToDay(${cell.date.getFullYear()},${cell.date.getMonth()},${cell.date.getDate()})">
      <div class="${stClass}">${cell.day}</div>
      ${chips}
    </td>`;
  }).join('')}</tr>`).join('');
}
function jumpToDay(y,m,d) {
  currentDate = new Date(y,m,d);
  setView('day');
  loadDay();
}

// ================================================================
// Shift Week Modal
// ================================================================
function openShiftModal() {
  shiftWeekBase = getMondayOfWeek(currentDate);
  renderShiftModal();
  document.getElementById('shiftModal').classList.add('open');
}
function closeShiftModal() { document.getElementById('shiftModal').classList.remove('open'); }
function shiftWeekShift(n) { shiftWeekBase=new Date(shiftWeekBase); shiftWeekBase.setDate(shiftWeekBase.getDate()+n*7); renderShiftModal(); }
async function renderShiftModal() {
  shiftWeekDays = getWeekDays(shiftWeekBase);
  const s=dateStr(shiftWeekDays[0]), e=dateStr(shiftWeekDays[5]);
  const DOW_S=['月','火','水','木','金','土'];
  shiftWeekDays.forEach((d,i) => {
    const el=document.getElementById(`sh${i}`);
    if(el) el.innerHTML=`${DOW_S[i]}<br><small>${d.getMonth()+1}/${d.getDate()}</small>`;
  });
  document.getElementById('shiftWeekLabel').textContent=`${shiftWeekDays[0].getMonth()+1}/${shiftWeekDays[0].getDate()} 〜 ${shiftWeekDays[5].getMonth()+1}/${shiftWeekDays[5].getDate()}`;
  const {data:ws}=await sb.from('placement_shifts').select('*').gte('shift_date',s).lte('shift_date',e);
  const sm={};
  (ws||[]).forEach(x=>{ sm[`${x.staff_id}_${x.shift_date}`]=x; });
  const tbody=document.getElementById('shiftWeekBody');
  tbody.innerHTML=staffList.map(st=>{
    const cells=shiftWeekDays.map((d,i)=>{
      const ds=dateStr(d), x=sm[`${st.id}_${ds}`]||{};
      return `<td style="padding:4px 3px;">
        <div style="display:flex;align-items:center;gap:2px;justify-content:center;">
          <input type="text" class="shift-input" placeholder="開始" value="${x.start_time||''}" id="ws_s_${st.id}_${i}">
          <span style="font-size:.65rem;color:var(--text-soft);">〜</span>
          <input type="text" class="shift-input" placeholder="終了" value="${x.end_time||''}" id="ws_e_${st.id}_${i}">
        </div>
      </td>`;
    }).join('');
    return `<tr>
      <td style="padding:5px 8px;white-space:nowrap;">
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="width:9px;height:9px;border-radius:50%;background:${st.color};display:inline-block;"></span>
          <span style="font-size:.8rem;font-weight:700;">${st.name}</span>
        </div>
      </td>${cells}
    </tr>`;
  }).join('');
}
async function saveShiftWeek() {
  const ups=[];
  staffList.forEach(st=>{
    shiftWeekDays.forEach((d,i)=>{
      const s=document.getElementById(`ws_s_${st.id}_${i}`)?.value.trim();
      const e=document.getElementById(`ws_e_${st.id}_${i}`)?.value.trim();
      if(s||e) ups.push({shift_date:dateStr(d),staff_id:st.id,start_time:s||null,end_time:e||null});
    });
  });
  if(ups.length) await sb.from('placement_shifts').upsert(ups,{onConflict:'shift_date,staff_id'});
  closeShiftModal();
  await loadDay();
}

// ================================================================
// Settings
// ================================================================
function openSettings() { renderStaffSettings(); renderTaskSettings(); document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function renderStaffSettings() {
  document.getElementById('staffSettingsList').innerHTML=staffList.map(s=>`
    <div class="staff-item">
      <div class="color-dot-sm" style="background:${s.color}" onclick="pickColor('${s.id}')"></div>
      <span style="flex:1;font-size:.85rem;font-weight:700;">${s.name}</span>
      <button class="btn-del-sm" onclick="deleteStaff('${s.id}')"><i class="bi bi-x-lg"></i></button>
    </div>`).join('');
}
function renderTaskSettings() {
  const area=document.getElementById('taskAreaFilter').value;
  document.getElementById('taskSettingsList').innerHTML=taskList.filter(t=>t.area_code===area).map(t=>`
    <div class="task-item-sm">
      <span style="flex:1;">${t.task_name}</span>
      <button class="btn-del-sm" onclick="deleteTask('${t.id}')"><i class="bi bi-x-lg"></i></button>
    </div>`).join('');
}
async function addStaff() {
  const name=document.getElementById('newStaffName').value.trim(); if(!name)return;
  const color=COLORS[staffList.length%COLORS.length];
  const {data}=await sb.from('placement_staff').insert({name,color,sort_order:staffList.length}).select().single();
  if(data){staffList.push(data);renderStaffSettings();renderBoard();}
  document.getElementById('newStaffName').value='';
}
async function deleteStaff(id) {
  if(!confirm('削除しますか？'))return;
  await sb.from('placement_staff').update({is_active:false}).eq('id',id);
  staffList=staffList.filter(s=>s.id!==id);
  renderStaffSettings();renderBoard();
}
async function addTask() {
  const name=document.getElementById('newTaskName').value.trim();
  const area=document.getElementById('taskAreaFilter').value;
  if(!name)return;
  const order=taskList.filter(t=>t.area_code===area).length+1;
  const {data}=await sb.from('placement_tasks').insert({area_code:area,task_name:name,sort_order:order}).select().single();
  if(data){taskList.push(data);renderTaskSettings();}
  document.getElementById('newTaskName').value='';
}
async function deleteTask(id) {
  await sb.from('placement_tasks').update({is_active:false}).eq('id',id);
  taskList=taskList.filter(t=>t.id!==id);
  renderTaskSettings();
}
function pickColor(staffId) {
  const s=staffList.find(x=>x.id===staffId); if(!s)return;
  const c=prompt('カラーコード（例: #EC4899）',s.color);
  if(c) updateStaffColor(staffId,c);
}
async function updateStaffColor(id,color) {
  await sb.from('placement_staff').update({color}).eq('id',id);
  const s=staffList.find(x=>x.id===id); if(s) s.color=color;
  renderStaffSettings();renderBoard();
}

// ================================================================
// Realtime
// ================================================================
function subscribeRealtime() {
  sb.channel('placement-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'placement_assignments'},()=>{
      clearTimeout(realtimeDebounce);
      realtimeDebounce=setTimeout(loadDay,500);
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'placement_task_checks'},()=>{
      if(Date.now()-lastOwnWrite<3000)return;
      clearTimeout(realtimeDebounce);
      realtimeDebounce=setTimeout(async()=>{
        const ids=assignments.map(a=>a.id); if(!ids.length)return;
        const {data:chks}=await sb.from('placement_task_checks').select('*').in('assignment_id',ids);
        const nc={};
        (chks||[]).forEach(c=>{if(!nc[c.assignment_id])nc[c.assignment_id]=new Set();nc[c.assignment_id].add(c.task_id);});
        taskChecks=nc; renderBoard();
      },500);
    })
    .subscribe();
}

// ================================================================
// Boot
// ================================================================
init();
</script>
