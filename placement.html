<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタッフ配置管理 | ANELLA CAFE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
  --area-A: #3B82F6; --area-A-bg: #EFF6FF; --area-A-border: #BFDBFE;
  --area-B: #10B981; --area-B-bg: #ECFDF5; --area-B-border: #A7F3D0;
  --area-C: #F59E0B; --area-C-bg: #FFFBEB; --area-C-border: #FDE68A;
  --area-off: #9CA3AF; --area-off-bg: #F3F4F6; --area-off-border: #E5E7EB;
  --unassigned: #6366F1; --unassigned-bg: #EEF2FF;
}
* { box-sizing: border-box; }
body { background: #F8FAFC; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; min-height: 100vh; }

/* ===== HEADER ===== */
.top-bar { background: #1E293B; color: #fff; padding: 10px 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.top-bar .site-name { font-weight: 700; font-size: .9rem; letter-spacing: .05em; }
.date-nav { display: flex; align-items: center; gap: 6px; }
.date-nav .date-label { font-size: .95rem; font-weight: 600; min-width: 130px; text-align: center; }
.btn-ghost { background: none; border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: .8rem; }
.btn-ghost:hover { background: rgba(255,255,255,.1); }
.view-toggle { display: flex; background: rgba(255,255,255,.12); border-radius: 8px; overflow: hidden; }
.view-toggle button { border: none; background: none; color: rgba(255,255,255,.7); padding: 4px 14px; font-size: .82rem; cursor: pointer; transition: .15s; }
.view-toggle button.active { background: #fff; color: #1E293B; font-weight: 600; }
.slot-toggle { display: flex; gap: 4px; }
.slot-btn { background: rgba(255,255,255,.12); border: none; color: rgba(255,255,255,.75); border-radius: 20px; padding: 4px 14px; font-size: .82rem; cursor: pointer; }
.slot-btn.active { background: #fff; color: #1E293B; font-weight: 700; }

/* ===== BOARD ===== */
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; min-height: calc(100vh - 120px); }
@media (max-width: 700px) { .board { grid-template-columns: 1fr 1fr; } }
@media (max-width: 440px) { .board { grid-template-columns: 1fr; } }

.area-col { border-radius: 14px; padding: 12px; min-height: 300px; transition: background .15s; }
.area-col.drag-over { outline: 2px dashed #6366F1; outline-offset: 2px; }
.area-col-header { font-size: .78rem; font-weight: 700; letter-spacing: .06em; padding: 6px 10px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.area-count { font-size: .72rem; font-weight: 600; background: rgba(0,0,0,.12); padding: 1px 7px; border-radius: 99px; }

.col-unassigned { background: var(--unassigned-bg); }
.col-unassigned .area-col-header { background: var(--unassigned); color: #fff; }
.col-A { background: var(--area-A-bg); border: 2px solid var(--area-A-border); }
.col-A .area-col-header { background: var(--area-A); color: #fff; }
.col-B { background: var(--area-B-bg); border: 2px solid var(--area-B-border); }
.col-B .area-col-header { background: var(--area-B); color: #fff; }
.col-C { background: var(--area-C-bg); border: 2px solid var(--area-C-border); }
.col-C .area-col-header { background: var(--area-C); color: #fff; }

/* ===== STAFF CARDS ===== */
.staff-card { background: #fff; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; transition: transform .15s, box-shadow .15s; user-select: none; }
.staff-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.staff-card.dragging { opacity: .5; transform: rotate(2deg); }
.staff-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
.staff-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.staff-name { font-weight: 600; font-size: .88rem; flex: 1; }
.area-badge { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
.badge-A { background: var(--area-A); color: #fff; }
.badge-B { background: var(--area-B); color: #fff; }
.badge-C { background: var(--area-C); color: #1E293B; }
.badge-off { background: var(--area-off); color: #fff; }
.task-panel { border-top: 1px solid #F1F5F9; padding: 8px 12px 10px; }
.task-item { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 6px; transition: background .12s; }
.task-item:hover { background: #F8FAFC; }
.task-item label { font-size: .8rem; color: #374151; cursor: pointer; flex: 1; }
.task-item input[type=checkbox] { accent-color: #3B82F6; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
.task-item.checked label { color: #3B82F6; font-weight: 600; }
.task-empty { font-size: .78rem; color: #94A3B8; text-align: center; padding: 6px 0; }

/* ===== WEEK VIEW ===== */
.week-view { padding: 16px; }
.week-table { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.week-table table { width: 100%; border-collapse: collapse; }
.week-table th { background: #1E293B; color: #fff; font-size: .8rem; font-weight: 600; padding: 10px 8px; text-align: center; }
.week-table td { border-bottom: 1px solid #F1F5F9; padding: 8px; vertical-align: top; }
.week-table tr:last-child td { border-bottom: none; }
.week-staff-name { font-weight: 600; font-size: .83rem; display: flex; align-items: center; gap: 6px; }
.week-cell { display: flex; flex-direction: column; gap: 3px; min-height: 40px; }
.week-chip { font-size: .7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-align: center; }
.chip-A { background: var(--area-A); color: #fff; }
.chip-B { background: var(--area-B); color: #fff; }
.chip-C { background: var(--area-C); color: #1E293B; }
.chip-off { background: #E5E7EB; color: #6B7280; }
.chip-none { background: #F1F5F9; color: #94A3B8; font-size: .65rem; }

/* ===== MODALS ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 18px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
.area-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; margin-bottom: 6px; transition: .15s; }
.area-option:hover { border-color: #CBD5E1; }
.area-option.selected-A { border-color: var(--area-A); background: var(--area-A-bg); }
.area-option.selected-B { border-color: var(--area-B); background: var(--area-B-bg); }
.area-option.selected-C { border-color: var(--area-C); background: var(--area-C-bg); }
.area-option.selected-off { border-color: var(--area-off); background: var(--area-off-bg); }
.area-option-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.area-option-label { font-weight: 600; font-size: .88rem; }
.modal-task-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid #F1F5F9; }
.modal-task-title { font-size: .8rem; font-weight: 700; color: #64748B; margin-bottom: 10px; letter-spacing: .06em; }

/* ===== SETTINGS ===== */
.settings-section { margin-bottom: 20px; }
.settings-section-title { font-size: .78rem; font-weight: 700; color: #64748B; letter-spacing: .07em; margin-bottom: 10px; }
.staff-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #F8FAFC; border-radius: 8px; margin-bottom: 6px; }
.color-dot-pick { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 0 1px #CBD5E1; }
.color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 10px; }
.color-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: .15s; }
.color-swatch.selected { border-color: #1E293B; }
.task-list-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #F8FAFC; border-radius: 8px; margin-bottom: 5px; font-size: .84rem; }
.btn-del { background: none; border: none; color: #EF4444; cursor: pointer; font-size: .9rem; padding: 2px 4px; }
.btn-sm-add { font-size: .8rem; padding: 4px 12px; border-radius: 8px; }

/* ===== FAB ===== */
.fab { position: fixed; bottom: 24px; right: 20px; background: #1E293B; color: #fff; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 1.4rem; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; z-index: 90; }
.fab:hover { background: #334155; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <span class="site-name"><i class="bi bi-layout-three-columns me-1"></i>スタッフ配置</span>
  <div class="date-nav">
    <button class="btn-ghost" onclick="shiftDay(-1)"><i class="bi bi-chevron-left"></i></button>
    <span class="date-label" id="dateLabel"></span>
    <button class="btn-ghost" onclick="shiftDay(1)"><i class="bi bi-chevron-right"></i></button>
    <button class="btn-ghost" onclick="goToday()">今日</button>
  </div>
  <div class="slot-toggle">
    <button class="slot-btn active" id="slotAm" onclick="setSlot('午前')">午前</button>
    <button class="slot-btn" id="slotPm" onclick="setSlot('午後')">午後</button>
  </div>
  <div class="view-toggle">
    <button class="active" id="viewDay" onclick="setView('day')">日次</button>
    <button id="viewWeek" onclick="setView('week')">週次</button>
  </div>
  <button class="btn-ghost ms-auto" onclick="openSettings()"><i class="bi bi-gear-fill"></i></button>
</div>

<!-- DAY VIEW -->
<div id="dayView">
  <div class="board">
    <div class="area-col col-unassigned" id="col-unassigned"
         ondragover="ev.preventDefault()" ondrop="dropCard(event,'')">
      <div class="area-col-header">
        <span><i class="bi bi-person-dash me-1"></i>未割当</span>
        <span class="area-count" id="cnt-unassigned">0</span>
      </div>
      <div id="cards-unassigned"></div>
    </div>
    <div class="area-col col-A" id="col-A"
         ondragover="event.preventDefault()" ondrop="dropCard(event,'A')">
      <div class="area-col-header">
        <span>A. ふれあい</span>
        <span class="area-count" id="cnt-A">0</span>
      </div>
      <div id="cards-A"></div>
    </div>
    <div class="area-col col-B" id="col-B"
         ondragover="event.preventDefault()" ondrop="dropCard(event,'B')">
      <div class="area-col-header">
        <span>B. 多目的室</span>
        <span class="area-count" id="cnt-B">0</span>
      </div>
      <div id="cards-B"></div>
    </div>
    <div class="area-col col-C" id="col-C"
         ondragover="event.preventDefault()" ondrop="dropCard(event,'C')">
      <div class="area-col-header">
        <span>C. 兼任</span>
        <span class="area-count" id="cnt-C">0</span>
      </div>
      <div id="cards-C"></div>
    </div>
  </div>
</div>

<!-- WEEK VIEW -->
<div id="weekView" style="display:none" class="week-view">
  <div class="week-table">
    <table>
      <thead>
        <tr>
          <th style="width:100px;">スタッフ</th>
          <th id="wh-0"></th><th id="wh-1"></th><th id="wh-2"></th>
          <th id="wh-3"></th><th id="wh-4"></th><th id="wh-5"></th>
        </tr>
      </thead>
      <tbody id="weekBody"></tbody>
    </table>
  </div>
</div>

<!-- ASSIGNMENT MODAL -->
<div class="modal-overlay" id="assignModal">
  <div class="modal-box">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="modal-title" id="assignModalTitle">配置設定</div>
      <button class="btn-del" onclick="closeAssignModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="areaOptions"></div>
    <div class="modal-task-section" id="modalTaskSection" style="display:none">
      <div class="modal-task-title">仕事内容（チェック）</div>
      <div id="modalTasks"></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary flex-1 w-100" onclick="saveAssignment()">保存</button>
      <button class="btn btn-outline-danger" onclick="removeAssignment()" title="配置解除">解除</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="modal-title">設定</div>
      <button class="btn-del" onclick="closeSettings()"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- スタッフ管理 -->
    <div class="settings-section">
      <div class="settings-section-title"><i class="bi bi-people me-1"></i>スタッフ管理</div>
      <div id="staffSettingsList"></div>
      <div class="d-flex gap-2 mt-2">
        <input type="text" class="form-control form-control-sm" id="newStaffName" placeholder="スタッフ名を入力" style="flex:1;">
        <button class="btn btn-sm btn-dark btn-sm-add" onclick="addStaff()">追加</button>
      </div>
    </div>

    <!-- タスク管理 -->
    <div class="settings-section">
      <div class="settings-section-title"><i class="bi bi-check2-square me-1"></i>仕事内容管理</div>
      <div class="mb-2">
        <select class="form-select form-select-sm" id="taskAreaFilter" onchange="renderTaskSettings()" style="width:160px;">
          <option value="A">A. ふれあい</option>
          <option value="B">B. 多目的室</option>
          <option value="C">C. 兼任</option>
        </select>
      </div>
      <div id="taskSettingsList"></div>
      <div class="d-flex gap-2 mt-2">
        <input type="text" class="form-control form-control-sm" id="newTaskName" placeholder="仕事内容を入力" style="flex:1;">
        <button class="btn btn-sm btn-dark btn-sm-add" onclick="addTask()">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openSettings()" title="設定"><i class="bi bi-gear-fill"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ================================================================
// Supabase
// ================================================================
const SUPABASE_URL = 'https://abeekodehorlwsmnhoza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZWVrb2RlaG9ybHdzbW5ob3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzAzMTksImV4cCI6MjA5Mjc0NjMxOX0.ZgOB2TUuBBRNV8pejae_UOX9kXIiFb-CS7X0alRX1uU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16'];
const AREA_INFO = {
  'A': { label:'A. ふれあい', color:'#3B82F6', cls:'A' },
  'B': { label:'B. 多目的室', color:'#10B981', cls:'B' },
  'C': { label:'C. 兼任',    color:'#F59E0B', cls:'C' },
  '休み': { label:'休み', color:'#9CA3AF', cls:'off' },
};
const DOW = ['日','月','火','水','木','金','土'];

// ================================================================
// State
// ================================================================
let currentDate = new Date();
let currentSlot = '午前';
let currentView = 'day';
let staffList  = [];
let taskList   = [];
let assignments = []; // for current date
let weekAssignments = []; // for week view
let taskChecks  = {};  // assignment_id -> Set of task_ids
let dragStaffId = null;
let editingStaffId = null;
let editingAreaCode = null;
let editingAssignmentId = null;

// ================================================================
// Date helpers
// ================================================================
const dateStr = d => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const dateLabel = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;

function shiftDay(n) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + n);
  loadDay();
}
function goToday() {
  currentDate = new Date();
  loadDay();
}
function setSlot(slot) {
  currentSlot = slot;
  document.getElementById('slotAm').classList.toggle('active', slot === '午前');
  document.getElementById('slotPm').classList.toggle('active', slot === '午後');
  renderBoard();
}
function setView(v) {
  currentView = v;
  document.getElementById('dayView').style.display  = v === 'day'  ? '' : 'none';
  document.getElementById('weekView').style.display = v === 'week' ? '' : 'none';
  document.getElementById('viewDay').classList.toggle('active',  v === 'day');
  document.getElementById('viewWeek').classList.toggle('active', v === 'week');
  if (v === 'week') loadWeek();
}

// ================================================================
// Load
// ================================================================
async function init() {
  document.getElementById('dateLabel').textContent = dateLabel(currentDate);
  const [sf, tk] = await Promise.all([
    sb.from('placement_staff').select('*').eq('is_active', true).order('sort_order'),
    sb.from('placement_tasks').select('*').eq('is_active', true).order('sort_order')
  ]);
  staffList = sf.data || [];
  taskList  = tk.data || [];
  await loadDay();
  subscribeRealtime();
}

async function loadDay() {
  document.getElementById('dateLabel').textContent = dateLabel(currentDate);
  const ds = dateStr(currentDate);
  const { data: asgn } = await sb.from('placement_assignments')
    .select('*').eq('assignment_date', ds);
  assignments = asgn || [];

  const ids = assignments.map(a => a.id);
  taskChecks = {};
  if (ids.length) {
    const { data: chks } = await sb.from('placement_task_checks')
      .select('*').in('assignment_id', ids);
    (chks || []).forEach(c => {
      if (!taskChecks[c.assignment_id]) taskChecks[c.assignment_id] = new Set();
      taskChecks[c.assignment_id].add(c.task_id);
    });
  }
  renderBoard();
}

async function loadWeek() {
  const start = new Date(currentDate);
  start.setDate(start.getDate() - start.getDay()); // 日曜始まり
  const days = Array.from({length:6}, (_,i) => {
    const d = new Date(start); d.setDate(start.getDate() + i + 1); // 月〜土
    return d;
  });
  const startStr = dateStr(days[0]), endStr = dateStr(days[5]);
  const { data } = await sb.from('placement_assignments')
    .select('*').gte('assignment_date', startStr).lte('assignment_date', endStr);
  weekAssignments = data || [];
  renderWeek(days);
}

// ================================================================
// Render Board
// ================================================================
function renderBoard() {
  const areas = ['unassigned','A','B','C'];
  const counts = { unassigned:0, A:0, B:0, C:0 };

  // Build area→staff map for current slot
  const areaMap = { unassigned:[], A:[], B:[], C:[] };
  staffList.forEach(staff => {
    const asgn = assignments.find(a => a.staff_id === staff.id && a.time_slot === currentSlot);
    const area = asgn?.area_code;
    if (area === 'A' || area === 'B' || area === 'C') {
      areaMap[area].push({ staff, asgn });
    } else if (area === '休み') {
      // show in unassigned with 休み badge
      areaMap.unassigned.push({ staff, asgn, isOff: true });
    } else {
      areaMap.unassigned.push({ staff, asgn: null });
    }
    counts[area === 'A' || area === 'B' || area === 'C' ? area : 'unassigned']++;
  });

  areas.forEach(key => {
    const el = document.getElementById(`cards-${key}`);
    el.innerHTML = '';
    areaMap[key].forEach(({ staff, asgn, isOff }) => {
      el.appendChild(buildCard(staff, asgn, isOff));
    });
    document.getElementById(`cnt-${key}`).textContent = areaMap[key].length;
  });
}

function buildCard(staff, asgn, isOff) {
  const area = asgn?.area_code;
  const div = document.createElement('div');
  div.className = 'staff-card';
  div.draggable = true;
  div.dataset.staffId = staff.id;
  div.addEventListener('dragstart', e => {
    dragStaffId = staff.id;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  let badgeHtml = '';
  if (isOff) {
    badgeHtml = `<span class="area-badge badge-off">休み</span>`;
  } else if (area) {
    badgeHtml = `<span class="area-badge badge-${area}">${AREA_INFO[area]?.label || area}</span>`;
  }

  // Tasks for this assignment
  const checks = asgn ? (taskChecks[asgn.id] || new Set()) : new Set();
  const areaTasks = taskList.filter(t => t.area_code === area);
  const taskHtml = areaTasks.length ? areaTasks.map(t => {
    const isChecked = checks.has(t.id);
    return `<div class="task-item${isChecked?' checked':''}">
      <input type="checkbox" id="tc-${staff.id}-${t.id}" ${isChecked?'checked':''}
        onchange="this.closest('.task-item').classList.toggle('checked',this.checked);toggleTask('${staff.id}','${t.id}','${area||''}',this.checked)">
      <label for="tc-${staff.id}-${t.id}">${t.task_name}</label>
    </div>`;
  }).join('') : '<div class="task-empty">タスクなし</div>';

  div.innerHTML = `
    <div class="staff-card-header" onclick="openAssignModal('${staff.id}')">
      <span class="staff-dot" style="background:${staff.color}"></span>
      <span class="staff-name">${staff.name}</span>
      ${badgeHtml}
      <i class="bi bi-pencil-square text-secondary" style="font-size:.78rem; opacity:.5;"></i>
    </div>
    ${area && area !== '休み' ? `<div class="task-panel">${taskHtml}</div>` : ''}`;
  return div;
}

// ================================================================
// Drag & Drop
// ================================================================
function dropCard(event, areaCode) {
  event.preventDefault();
  if (!dragStaffId) return;
  saveAreaDirectly(dragStaffId, areaCode || null);
  dragStaffId = null;
}

async function saveAreaDirectly(staffId, areaCode) {
  const ds = dateStr(currentDate);
  const existing = assignments.find(a => a.staff_id === staffId && a.time_slot === currentSlot);
  if (existing) {
    await sb.from('placement_assignments').update({ area_code: areaCode || null, updated_at: new Date().toISOString() }).eq('id', existing.id);
  } else if (areaCode) {
    await sb.from('placement_assignments').insert({ assignment_date: ds, staff_id: staffId, time_slot: currentSlot, area_code: areaCode });
  }
  await loadDay();
}

// ================================================================
// Assignment Modal
// ================================================================
function openAssignModal(staffId) {
  editingStaffId = staffId;
  const staff = staffList.find(s => s.id === staffId);
  const asgn = assignments.find(a => a.staff_id === staffId && a.time_slot === currentSlot);
  editingAssignmentId = asgn?.id || null;
  editingAreaCode = asgn?.area_code || null;

  document.getElementById('assignModalTitle').textContent = `${staff.name} - ${currentSlot}の配置`;

  const opts = document.getElementById('areaOptions');
  opts.innerHTML = ['A','B','C','休み'].map(code => {
    const info = AREA_INFO[code];
    const selClass = editingAreaCode === code ? `selected-${info.cls}` : '';
    return `<div class="area-option ${selClass}" onclick="selectArea('${code}')" id="opt-${code}">
      <div class="area-option-dot" style="background:${info.color}"></div>
      <div class="area-option-label">${info.label}</div>
    </div>`;
  }).join('');

  renderModalTasks(editingAreaCode, asgn?.id);
  document.getElementById('assignModal').classList.add('open');
}

function selectArea(code) {
  editingAreaCode = code;
  ['A','B','C','休み'].forEach(c => {
    const info = AREA_INFO[c];
    const el = document.getElementById(`opt-${c}`);
    el.className = `area-option ${c === code ? 'selected-'+info.cls : ''}`;
  });
  renderModalTasks(code, editingAssignmentId);
}

function renderModalTasks(areaCode, assignmentId) {
  const section = document.getElementById('modalTaskSection');
  const taskDiv = document.getElementById('modalTasks');
  if (!areaCode || areaCode === '休み') { section.style.display = 'none'; return; }
  section.style.display = 'block';
  const checks = assignmentId ? (taskChecks[assignmentId] || new Set()) : new Set();
  const areaTasks = taskList.filter(t => t.area_code === areaCode);
  taskDiv.innerHTML = areaTasks.map(t => `
    <div class="task-item">
      <input type="checkbox" id="mt-${t.id}" ${checks.has(t.id)?'checked':''}>
      <label for="mt-${t.id}">${t.task_name}</label>
    </div>`).join('') || '<div class="task-empty">このエリアのタスクがありません</div>';
}

async function saveAssignment() {
  const ds = dateStr(currentDate);
  let aId = editingAssignmentId;

  if (aId) {
    await sb.from('placement_assignments').update({ area_code: editingAreaCode, updated_at: new Date().toISOString() }).eq('id', aId);
  } else {
    const { data } = await sb.from('placement_assignments').insert({
      assignment_date: ds, staff_id: editingStaffId, time_slot: currentSlot, area_code: editingAreaCode
    }).select().single();
    aId = data?.id;
  }

  // Save task checks
  if (aId && editingAreaCode && editingAreaCode !== '休み') {
    await sb.from('placement_task_checks').delete().eq('assignment_id', aId);
    const areaTasks = taskList.filter(t => t.area_code === editingAreaCode);
    const checked = areaTasks.filter(t => document.getElementById(`mt-${t.id}`)?.checked);
    if (checked.length) {
      await sb.from('placement_task_checks').insert(checked.map(t => ({ assignment_id: aId, task_id: t.id })));
    }
  }

  closeAssignModal();
  await loadDay();
}

async function removeAssignment() {
  if (editingAssignmentId) {
    await sb.from('placement_assignments').delete().eq('id', editingAssignmentId);
  }
  closeAssignModal();
  await loadDay();
}

function closeAssignModal() { document.getElementById('assignModal').classList.remove('open'); }

// ================================================================
// Inline task toggle (card チェックボックス)
// ================================================================
async function toggleTask(staffId, taskId, areaCode, checked) {
  const ds = dateStr(currentDate);
  let asgn = assignments.find(a => a.staff_id === staffId && a.time_slot === currentSlot);
  if (!asgn) {
    const { data } = await sb.from('placement_assignments').insert({
      assignment_date: ds, staff_id: staffId, time_slot: currentSlot, area_code: areaCode
    }).select().single();
    asgn = data;
    if (!asgn) return;
    assignments.push(asgn);
  }
  if (checked) {
    await sb.from('placement_task_checks').insert({ assignment_id: asgn.id, task_id: taskId }).onConflict().ignore();
    if (!taskChecks[asgn.id]) taskChecks[asgn.id] = new Set();
    taskChecks[asgn.id].add(taskId);
  } else {
    await sb.from('placement_task_checks').delete().eq('assignment_id', asgn.id).eq('task_id', taskId);
    taskChecks[asgn.id]?.delete(taskId);
  }
}

// ================================================================
// Week View
// ================================================================
function renderWeek(days) {
  const DOW_SHORT = ['月','火','水','木','金','土'];
  days.forEach((d,i) => {
    document.getElementById(`wh-${i}`).innerHTML = `${DOW_SHORT[i]}<br><span style="font-weight:400;font-size:.7rem;">${d.getMonth()+1}/${d.getDate()}</span>`;
  });

  const tbody = document.getElementById('weekBody');
  tbody.innerHTML = staffList.map(staff => {
    const cells = days.map(d => {
      const ds = dateStr(d);
      const am = weekAssignments.find(a => a.staff_id === staff.id && a.assignment_date === ds && a.time_slot === '午前');
      const pm = weekAssignments.find(a => a.staff_id === staff.id && a.assignment_date === ds && a.time_slot === '午後');
      const chip = (a, label) => {
        if (!a) return `<div class="week-chip chip-none">${label}</div>`;
        if (a.area_code === '休み') return `<div class="week-chip chip-off">休み</div>`;
        return `<div class="week-chip chip-${a.area_code}">${a.area_code}</div>`;
      };
      return `<td><div class="week-cell">${chip(am,'午前')}${chip(pm,'午後')}</div></td>`;
    }).join('');
    return `<tr>
      <td><div class="week-staff-name">
        <span style="width:10px;height:10px;border-radius:50%;background:${staff.color};display:inline-block;flex-shrink:0;"></span>
        ${staff.name}
      </div></td>
      ${cells}
    </tr>`;
  }).join('');
}

// ================================================================
// Settings
// ================================================================
function openSettings() {
  renderStaffSettings();
  renderTaskSettings();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function renderStaffSettings() {
  const list = document.getElementById('staffSettingsList');
  list.innerHTML = staffList.map(s => `
    <div class="staff-list-item">
      <div class="color-dot-pick" style="background:${s.color}" onclick="pickColor('${s.id}')"></div>
      <span style="flex:1;font-size:.85rem;font-weight:600;">${s.name}</span>
      <button class="btn-del" onclick="deleteStaff('${s.id}')"><i class="bi bi-x-lg"></i></button>
    </div>`).join('');
}

function renderTaskSettings() {
  const area = document.getElementById('taskAreaFilter').value;
  const list = document.getElementById('taskSettingsList');
  const tasks = taskList.filter(t => t.area_code === area);
  list.innerHTML = tasks.map(t => `
    <div class="task-list-item">
      <span style="flex:1;">${t.task_name}</span>
      <button class="btn-del" onclick="deleteTask('${t.id}')"><i class="bi bi-x-lg"></i></button>
    </div>`).join('');
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return;
  const color = COLORS[staffList.length % COLORS.length];
  const { data } = await sb.from('placement_staff').insert({ name, color, sort_order: staffList.length }).select().single();
  if (data) { staffList.push(data); renderStaffSettings(); renderBoard(); }
  document.getElementById('newStaffName').value = '';
}

async function deleteStaff(id) {
  if (!confirm('このスタッフを削除しますか？')) return;
  await sb.from('placement_staff').update({ is_active: false }).eq('id', id);
  staffList = staffList.filter(s => s.id !== id);
  renderStaffSettings(); renderBoard();
}

async function addTask() {
  const name = document.getElementById('newTaskName').value.trim();
  const area = document.getElementById('taskAreaFilter').value;
  if (!name) return;
  const order = taskList.filter(t => t.area_code === area).length + 1;
  const { data } = await sb.from('placement_tasks').insert({ area_code: area, task_name: name, sort_order: order }).select().single();
  if (data) { taskList.push(data); renderTaskSettings(); }
  document.getElementById('newTaskName').value = '';
}

async function deleteTask(id) {
  await sb.from('placement_tasks').update({ is_active: false }).eq('id', id);
  taskList = taskList.filter(t => t.id !== id);
  renderTaskSettings();
}

function pickColor(staffId) {
  const staff = staffList.find(s => s.id === staffId);
  if (!staff) return;
  const color = prompt('カラーコードを入力（例: #3B82F6）', staff.color);
  if (color) updateStaffColor(staffId, color);
}

async function updateStaffColor(id, color) {
  await sb.from('placement_staff').update({ color }).eq('id', id);
  const s = staffList.find(s => s.id === id);
  if (s) s.color = color;
  renderStaffSettings(); renderBoard();
}

// ================================================================
// Realtime
// ================================================================
function subscribeRealtime() {
  sb.channel('placement-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'placement_assignments' }, () => loadDay())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'placement_task_checks' }, () => loadDay())
    .subscribe();
}

// ================================================================
// Init
// ================================================================
init();
</script>
