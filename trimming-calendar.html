<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約カレンダー | ANELLA CAFE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      --bg: #FDF6EE;
      --surface: #FFFAF4;
      --primary: #C96A3B;
      --primary-light: #E8946A;
      --primary-bg: #FFF3EE;
      --accent: #4A7C6F;
      --accent-light: #6FA898;
      --accent-bg: #EEF6F4;
      --both: #7B68EE;
      --both-bg: #F0EEFF;
      --text: #2C1F14;
      --text-mid: #6B4F3A;
      --text-soft: #A88870;
      --border: #E8D5C0;
      --shadow: rgba(150, 80, 30, 0.10);
      --warn: #D4502A;
      --warn-bg: #FFF3EE;
      --gray: #9E9E9E;
      --gray-bg: #F5F5F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; overflow-x: hidden; }

    /* ── ログイン ── */
    #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px var(--shadow); }
    .login-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--primary); text-align: center; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-soft); text-align: center; margin-bottom: 32px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; }
    .login-field input { width: 100%; padding: 13px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--text); outline: none; }
    .login-field input:focus { border-color: var(--primary-light); }
    .login-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 12px rgba(201,106,59,0.3); }
    .login-btn:disabled { background: #D0B49E; box-shadow: none; cursor: not-allowed; }
    .login-err { color: var(--warn); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    .login-err.active { display: block; }

    /* ── メイン ── */
    #mainScreen { display: none; height: 100vh; display: none; flex-direction: column; }

    /* ── ヘッダー ── */
    .cal-header { background: var(--text); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 200; }
    .cal-logo { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--primary-light); white-space: nowrap; }
    .view-switcher { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #555; margin-left: auto; }
    .view-btn { padding: 7px 14px; background: transparent; border: none; color: #aaa; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .view-btn.active { background: var(--primary); color: #fff; }
    .nav-wrap { display: flex; align-items: center; gap: 6px; }
    .nav-btn { width: 30px; height: 30px; background: transparent; border: 1px solid #555; border-radius: 6px; color: #ccc; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .nav-btn:hover { border-color: #aaa; color: #fff; }
    .nav-label { font-size: 13px; font-weight: 700; color: #eee; white-space: nowrap; min-width: 130px; text-align: center; }
    .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .admin-link { padding: 6px 12px; background: transparent; border: 1px solid #555; border-radius: 6px; color: #ccc; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .admin-link:hover { border-color: #aaa; color: #fff; }
    .logout-btn { padding: 6px 12px; background: transparent; border: 1px solid #555; border-radius: 6px; color: #ccc; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; }
    .logout-btn:hover { border-color: #aaa; color: #fff; }
    .realtime-indicator { display: flex; align-items: center; gap: 4px; }
    .rt-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
    .rt-dot.on { background: #4CAF50; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ── 凡例 ── */
    .legend-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-mid); }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-dot.staffa { background: var(--primary); }
    .legend-dot.staffb { background: var(--accent); }
    .legend-dot.both { background: var(--both); }
    .legend-dot.visited { background: #81C784; }
    .legend-dot.cancelled { background: var(--gray); }
    .legend-dot.blocked { background: repeating-linear-gradient(45deg, #ddd 0, #ddd 3px, #f5f5f5 3px, #f5f5f5 6px); border: 1px solid #ccc; }

    /* ── カレンダー本体 ── */
    #calendarWrap { flex: 1; overflow: auto; }

    /* ───────────────────────────────── 月表示 */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
    .month-weekday { text-align: center; padding: 8px 4px; font-size: 11px; font-weight: 700; color: var(--text-soft); background: var(--surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .month-weekday.sun { color: var(--warn); }
    .month-weekday.sat { color: var(--accent); }
    .month-cell { min-height: 90px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px; background: var(--bg); transition: background 0.15s; cursor: pointer; }
    .month-cell:hover:not(.other-month) { background: var(--surface); }
    .month-cell.other-month { background: #FAF4EC; }
    .month-cell.today .day-num { background: var(--primary); color: #fff; border-radius: 50%; }
    .month-cell.selected { background: var(--warn-bg); }
    .day-num { display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .month-cell.other-month .day-num { color: var(--border); }
    .month-cell.sun .day-num { color: var(--warn); }
    .month-cell.sat .day-num { color: var(--accent); }
    .month-cell.today .day-num { color: #fff; }
    .month-pill { display: flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; color: #fff; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; }
    .month-pill.staffa { background: var(--primary); }
    .month-pill.staffb { background: var(--accent); }
    .month-pill.both { background: var(--both); }
    .month-pill.visited { background: #81C784; }
    .month-pill.cancelled { background: var(--gray); }
    .more-pill { font-size: 10px; color: var(--text-soft); padding: 1px 4px; }

    /* ───────────────────────────────── 週表示 */
    .week-wrap { min-width: 560px; }
    .week-header-row { display: grid; grid-template-columns: 50px repeat(7, 1fr); border-bottom: 2px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
    .week-header-cell { padding: 8px 4px; text-align: center; border-right: 1px solid var(--border); }
    .week-header-cell:first-child { border-right: 2px solid var(--border); }
    .week-day-name { font-size: 11px; font-weight: 700; color: var(--text-soft); }
    .week-day-num { font-size: 16px; font-weight: 700; color: var(--text); }
    .week-header-cell.today .week-day-num { background: var(--primary); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; }
    .week-header-cell.sun .week-day-name, .week-header-cell.sun .week-day-num { color: var(--warn); }
    .week-header-cell.sat .week-day-name, .week-header-cell.sat .week-day-num { color: var(--accent); }
    .week-body { display: grid; grid-template-columns: 50px repeat(7, 1fr); }
    .week-time-cell { padding: 0 6px; height: 64px; display: flex; align-items: flex-start; justify-content: flex-end; padding-top: 6px; border-right: 2px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); }
    .week-time-label { font-size: 11px; color: var(--text-soft); font-weight: 700; }
    .week-slot { height: 64px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 3px; position: relative; background: var(--bg); }
    .week-slot.blocked { background: repeating-linear-gradient(45deg, #f0f0f0 0, #f0f0f0 4px, var(--bg) 4px, var(--bg) 8px); }
    .week-block { display: block; width: 100%; border-radius: 5px; padding: 3px 5px; font-size: 10px; font-weight: 700; color: #fff; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1.4; transition: opacity 0.15s; }
    .week-block:hover { opacity: 0.85; }
    .week-block.staffa { background: var(--primary); }
    .week-block.staffb { background: var(--accent); }
    .week-block.both { background: var(--both); }
    .week-block.visited { background: #81C784; }
    .week-block.cancelled { background: var(--gray); text-decoration: line-through; }

    /* ───────────────────────────────── 日表示 */
    .day-wrap { max-width: 700px; margin: 0 auto; padding: 12px 12px 40px; }
    .day-date-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--primary); margin-bottom: 12px; text-align: center; }
    .day-grid { display: grid; grid-template-columns: 50px 1fr 1fr; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .day-header { padding: 10px 8px; text-align: center; font-size: 12px; font-weight: 700; background: var(--surface); border-bottom: 2px solid var(--border); }
    .day-header.staffa-col { color: var(--primary); border-bottom-color: var(--primary); }
    .day-header.staffb-col { color: var(--accent); border-bottom-color: var(--accent); border-left: 1px solid var(--border); }
    .day-time-label { padding: 0 8px; height: 72px; display: flex; align-items: flex-start; justify-content: flex-end; padding-top: 8px; border-bottom: 1px solid var(--border); background: var(--surface); font-size: 12px; font-weight: 700; color: var(--text-soft); }
    .day-slot { height: 72px; border-bottom: 1px solid var(--border); padding: 4px; position: relative; border-left: 1px solid var(--border); }
    .day-slot.blocked { background: repeating-linear-gradient(45deg, #f0f0f0 0, #f0f0f0 4px, var(--bg) 4px, var(--bg) 8px); }
    .day-block { display: block; width: 100%; height: calc(100% - 4px); border-radius: 8px; padding: 6px 8px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; overflow: hidden; transition: opacity 0.15s; }
    .day-block:hover { opacity: 0.85; }
    .day-block.staffa { background: var(--primary); }
    .day-block.staffb { background: var(--accent); }
    .day-block.both { background: var(--both); }
    .day-block.visited { background: #81C784; }
    .day-block.cancelled { background: var(--gray); }
    .day-block-name { font-size: 13px; }
    .day-block-course { font-size: 10px; opacity: 0.85; margin-top: 2px; }
    .day-block-status { font-size: 10px; opacity: 0.85; }

    /* ── モーダル ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; align-items: flex-end; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.22s ease; }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @media (min-width: 660px) { .modal-overlay { align-items: center; } .modal { border-radius: 20px; max-height: 82vh; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--primary); }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 16px; color: var(--text-soft); display: flex; align-items: center; justify-content: center; }
    .detail-section { margin-bottom: 14px; }
    .detail-section-title { font-size: 12px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
    .status-btns { display: flex; gap: 8px; margin-bottom: 14px; }
    .status-btn { flex: 1; padding: 11px 6px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-mid); transition: all 0.15s; }
    .status-btn.active-booked { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
    .status-btn.active-visited { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
    .status-btn.active-cancelled { border-color: var(--gray); background: var(--gray-bg); color: var(--gray); }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table th { padding: 8px 10px; color: var(--text-soft); font-weight: 500; text-align: left; width: 36%; }
    .detail-table td { padding: 8px 10px; color: var(--text); font-weight: 500; }
    .memo-area { width: 100%; padding: 11px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--text); resize: vertical; min-height: 72px; outline: none; }
    .memo-area:focus { border-color: var(--primary-light); }
    .save-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .save-ok { text-align: center; font-size: 13px; color: var(--accent); margin-top: 7px; display: none; }
    .save-ok.active { display: block; }

    /* ── ローディング ── */
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(253,246,238,0.75); z-index: 300; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }
    .spinner { width: 38px; height: 38px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<!-- ===== ログイン ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">ANELLA CAFE</div>
    <div class="login-sub">予約カレンダー</div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="anellacafeoita@gmail.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== メイン ===== -->
<div id="mainScreen">
  <!-- ヘッダー -->
  <div class="cal-header">
    <span class="cal-logo">ANELLA Calendar</span>
    <div class="nav-wrap">
      <button class="nav-btn" onclick="navigate(-1)">‹</button>
      <span class="nav-label" id="navLabel"></span>
      <button class="nav-btn" onclick="navigate(1)">›</button>
    </div>
    <div class="view-switcher">
      <button class="view-btn active" id="vMonth" onclick="setView('month')">月</button>
      <button class="view-btn" id="vWeek" onclick="setView('week')">週</button>
      <button class="view-btn" id="vDay" onclick="setView('day')">日</button>
    </div>
    <div class="header-right">
      <div class="realtime-indicator"><div class="rt-dot" id="rtDot"></div></div>
      <a class="admin-link" href="trimming-admin.html">管理</a>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- 凡例 -->
  <div class="legend-bar">
    <span class="legend-item"><span class="legend-dot staffa"></span>スタッフA（予約済み）</span>
    <span class="legend-item"><span class="legend-dot staffb"></span>スタッフB（予約済み）</span>
    <span class="legend-item"><span class="legend-dot both"></span>どちらでも可</span>
    <span class="legend-item"><span class="legend-dot visited"></span>来店済み</span>
    <span class="legend-item"><span class="legend-dot cancelled"></span>キャンセル</span>
    <span class="legend-item"><span class="legend-dot blocked"></span>ブロック</span>
  </div>

  <!-- カレンダー本体 -->
  <div id="calendarWrap"></div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">ステータス変更</div>
      <div class="status-btns">
        <button class="status-btn" id="sbBooked"   onclick="changeStatus('予約済み')">予約済み</button>
        <button class="status-btn" id="sbVisited"  onclick="changeStatus('来店済み')">来店済み</button>
        <button class="status-btn" id="sbCancelled" onclick="changeStatus('キャンセル')">キャンセル</button>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">予約詳細</div>
      <table class="detail-table" id="detailTable"></table>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">スタッフメモ</div>
      <textarea class="memo-area" id="memoArea" placeholder="スタッフ内部メモ（お客様には非表示）" maxlength="500"></textarea>
      <button class="save-btn" id="saveBtn" onclick="saveMemo()">メモを保存する</button>
      <div class="save-ok" id="saveOk">✅ 保存しました</div>
    </div>
  </div>
</div>

<script>
// ── 定数 ──────────────────────────────────────────
const TIME_SLOTS = ['10:00','11:00','12:00','13:00','14:00','15:00'];
const WEEKDAYS   = ['日','月','火','水','木','金','土'];

// ── 状態 ──────────────────────────────────────────
const S = {
  view: 'month',
  cursor: new Date(),        // 現在参照中の日付
  reservations: [],
  blockedTimes: [],
  selectedResId: null,
  selectedResData: null,
};

// ── 認証 ──────────────────────────────────────────
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showMain(session.user.email);
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  if (!email || !pass) { showLoginErr('メールとパスワードを入力してください'); return; }
  btn.disabled = true; btn.textContent = 'ログイン中...';
  err.classList.remove('active');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'ログイン';
  if (error) { showLoginErr('メールまたはパスワードが正しくありません'); return; }
  showMain(data.user.email);
}

async function doLogout() {
  await supabase.auth.signOut();
  location.reload();
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.classList.add('active');
}

function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  S.cursor = new Date(); S.cursor.setHours(0,0,0,0);
  loadAndRender();
  setupRealtime();
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── リアルタイム ──────────────────────────────────
function setupRealtime() {
  supabase.channel('cal-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'trimming_reservations' }, loadAndRender)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'blocked_times' }, loadAndRender)
    .subscribe(status => {
      const dot = document.getElementById('rtDot');
      dot.classList.toggle('on', status === 'SUBSCRIBED');
    });
}

// ── ビュー切替・ナビ ──────────────────────────────
function setView(v) {
  S.view = v;
  ['Month','Week','Day'].forEach(n => {
    document.getElementById('v'+n).classList.toggle('active', v === n.toLowerCase());
  });
  loadAndRender();
}

function navigate(dir) {
  const d = new Date(S.cursor);
  if (S.view === 'month')      { d.setMonth(d.getMonth() + dir); }
  else if (S.view === 'week')  { d.setDate(d.getDate() + dir * 7); }
  else                          { d.setDate(d.getDate() + dir); }
  S.cursor = d;
  loadAndRender();
}

// ── データ取得 ────────────────────────────────────
function getRange() {
  const d = new Date(S.cursor);
  if (S.view === 'month') {
    const start = new Date(d.getFullYear(), d.getMonth(), 1);
    const end   = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    return [start, end];
  } else if (S.view === 'week') {
    const start = new Date(d); start.setDate(d.getDate() - d.getDay());
    const end   = new Date(start); end.setDate(start.getDate() + 6);
    return [start, end];
  } else {
    return [new Date(d), new Date(d)];
  }
}

function fmtDate(d) {
  return d.toISOString().slice(0,10);
}

async function loadAndRender() {
  document.getElementById('loadingOverlay').classList.add('active');
  const [start, end] = getRange();
  const s = fmtDate(start), e = fmtDate(end);

  const [{ data: res }, { data: blk }] = await Promise.all([
    supabase.from('trimming_reservations').select('*').gte('visit_date', s).lte('visit_date', e).order('visit_time'),
    supabase.from('blocked_times').select('*').gte('block_date', s).lte('block_date', e),
  ]);

  S.reservations = res || [];
  S.blockedTimes = blk || [];
  document.getElementById('loadingOverlay').classList.remove('active');
  render();
}

// ── レンダリング ──────────────────────────────────
function render() {
  updateNavLabel();
  if (S.view === 'month')      renderMonth();
  else if (S.view === 'week')  renderWeek();
  else                          renderDay();
}

function updateNavLabel() {
  const d = S.cursor;
  const el = document.getElementById('navLabel');
  if (S.view === 'month') {
    el.textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月`;
  } else if (S.view === 'week') {
    const [s, e] = getRange();
    el.textContent = `${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
  } else {
    el.textContent = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`;
  }
}

// ── 月表示 ────────────────────────────────────────
function renderMonth() {
  const d = S.cursor;
  const year = d.getFullYear(), month = d.getMonth();
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const wrap = document.getElementById('calendarWrap');

  let html = '<div class="month-grid">';
  ['日','月','火','水','木','金','土'].forEach((w,i) => {
    html += `<div class="month-weekday ${i===0?'sun':i===6?'sat':''}">${w}</div>`;
  });

  // 前月の空白
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const day = prevLast - firstDay + i + 1;
    html += `<div class="month-cell other-month"><span class="day-num">${day}</span></div>`;
  }

  for (let day = 1; day <= lastDate; day++) {
    const dateObj = new Date(year, month, day);
    const dateStr = fmtDate(dateObj);
    const dow = dateObj.getDay();
    const isToday = dateObj.getTime() === today.getTime();
    const classes = ['month-cell',
      dow===0?'sun':dow===6?'sat':'',
      isToday?'today':'',
    ].filter(Boolean).join(' ');

    const dayRes = S.reservations.filter(r => r.visit_date === dateStr);
    const shown = dayRes.slice(0, 3);
    const extra = dayRes.length - 3;

    let pills = shown.map(r => {
      const cls = pillClass(r);
      const time = r.visit_time.slice(0,5);
      return `<div class="month-pill ${cls}" onclick="openModal(event,'${r.id}')">${time} ${r.pet_name}</div>`;
    }).join('');
    if (extra > 0) pills += `<div class="more-pill">+${extra}件</div>`;

    html += `<div class="${classes}" onclick="handleMonthCellClick('${dateStr}')"><span class="day-num">${day}</span>${pills}</div>`;
  }

  // 次月の空白（6週分になるように）
  const total = firstDay + lastDate;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="month-cell other-month"><span class="day-num">${i}</span></div>`;
  }

  html += '</div>';
  wrap.innerHTML = html;
}

function handleMonthCellClick(dateStr) {
  S.cursor = new Date(dateStr + 'T00:00:00');
  setView('day');
}

// ── 週表示 ────────────────────────────────────────
function renderWeek() {
  const [rangeStart] = getRange();
  const today = new Date(); today.setHours(0,0,0,0);

  let html = '<div style="overflow-x:auto;"><div class="week-wrap">';
  html += '<div class="week-header-row"><div class="week-header-cell"></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(rangeStart); d.setDate(rangeStart.getDate() + i);
    const dow = d.getDay();
    const isToday = d.getTime() === today.getTime();
    const cls = ['week-header-cell', dow===0?'sun':dow===6?'sat':'', isToday?'today':''].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="drillDay('${fmtDate(d)}')"><div class="week-day-name">${WEEKDAYS[dow]}</div><div class="week-day-num">${d.getDate()}</div></div>`;
  }
  html += '</div><div class="week-body">';

  TIME_SLOTS.forEach(t => {
    html += `<div class="week-time-cell"><span class="week-time-label">${t}</span></div>`;
    for (let i = 0; i < 7; i++) {
      const d = new Date(rangeStart); d.setDate(rangeStart.getDate() + i);
      const dateStr = fmtDate(d);
      const slotRes = S.reservations.filter(r => r.visit_date === dateStr && r.visit_time.slice(0,5) === t);
      const isBlocked = S.blockedTimes.some(b => b.block_date === dateStr && b.block_time.slice(0,5) === t);
      const slotCls = isBlocked ? 'week-slot blocked' : 'week-slot';
      let inner = slotRes.map(r => {
        const cls = blockClass(r);
        return `<span class="week-block ${cls}" onclick="openModal(event,'${r.id}')">${r.visit_time.slice(0,5)} ${r.pet_name}</span>`;
      }).join('');
      html += `<div class="${slotCls}">${inner}</div>`;
    }
  });

  html += '</div></div></div>';
  document.getElementById('calendarWrap').innerHTML = html;
}

function drillDay(dateStr) {
  S.cursor = new Date(dateStr + 'T00:00:00');
  setView('day');
}

// ── 日表示 ────────────────────────────────────────
function renderDay() {
  const dateStr = fmtDate(S.cursor);
  const dow = S.cursor.getDay();
  const dayRes = S.reservations.filter(r => r.visit_date === dateStr);
  const dayBlk = S.blockedTimes.filter(b => b.block_date === dateStr);

  const staffARes = r => r.staff === 'スタッフA';
  const staffBRes = r => r.staff === 'スタッフB';
  const staffAnyRes = r => r.staff === 'どちらでも可';

  let html = `<div class="day-wrap">
    <div class="day-date-title">${S.cursor.getFullYear()}年 ${S.cursor.getMonth()+1}月 ${S.cursor.getDate()}日（${WEEKDAYS[dow]}）</div>
    <div class="day-grid">
      <div class="day-header"></div>
      <div class="day-header staffa-col">スタッフA</div>
      <div class="day-header staffb-col">スタッフB</div>`;

  TIME_SLOTS.forEach(t => {
    const aRes = dayRes.filter(r => (staffARes(r) || staffAnyRes(r)) && r.visit_time.slice(0,5) === t);
    const bRes = dayRes.filter(r => (staffBRes(r) || staffAnyRes(r)) && r.visit_time.slice(0,5) === t);
    const aBlk = dayBlk.some(b => b.block_time.slice(0,5) === t && (b.staff === 'スタッフA'));
    const bBlk = dayBlk.some(b => b.block_time.slice(0,5) === t && (b.staff === 'スタッフB'));

    html += `<div class="day-time-label">${t}</div>`;

    // スタッフA列
    html += `<div class="day-slot ${aBlk ? 'blocked' : ''}">`;
    aRes.forEach(r => {
      const cls = blockClass(r);
      html += `<div class="day-block ${cls}" onclick="openModal(event,'${r.id}')">
        <div class="day-block-name">${r.pet_name}</div>
        <div class="day-block-course">${r.course}</div>
        <div class="day-block-status">${r.status === '来店済み' ? '✅' : r.status === 'キャンセル' ? '❌' : ''}</div>
      </div>`;
    });
    html += '</div>';

    // スタッフB列
    html += `<div class="day-slot ${bBlk ? 'blocked' : ''}">`;
    bRes.forEach(r => {
      const cls = blockClass(r);
      html += `<div class="day-block ${cls}" onclick="openModal(event,'${r.id}')">
        <div class="day-block-name">${r.pet_name}</div>
        <div class="day-block-course">${r.course}</div>
        <div class="day-block-status">${r.status === '来店済み' ? '✅' : r.status === 'キャンセル' ? '❌' : ''}</div>
      </div>`;
    });
    html += '</div>';
  });

  html += '</div></div>';
  document.getElementById('calendarWrap').innerHTML = html;
}

// ── 色クラス ──────────────────────────────────────
function pillClass(r) {
  if (r.status === '来店済み') return 'visited';
  if (r.status === 'キャンセル') return 'cancelled';
  if (r.staff === 'スタッフA') return 'staffa';
  if (r.staff === 'スタッフB') return 'staffb';
  return 'both';
}
function blockClass(r) {
  if (r.status === '来店済み') return 'visited';
  if (r.status === 'キャンセル') return 'cancelled';
  if (r.staff === 'スタッフA') return 'staffa';
  if (r.staff === 'スタッフB') return 'staffb';
  return 'both';
}

// ── モーダル ──────────────────────────────────────
function openModal(e, id) {
  e.stopPropagation();
  const r = S.reservations.find(r => r.id === id);
  if (!r) return;
  S.selectedResId = id;
  S.selectedResData = r;

  document.getElementById('modalTitle').textContent = `${r.visit_time.slice(0,5)} ${r.pet_name}（${r.breed}）`;
  document.getElementById('sbBooked').className   = 'status-btn' + (r.status === '予約済み'  ? ' active-booked'    : '');
  document.getElementById('sbVisited').className  = 'status-btn' + (r.status === '来店済み'  ? ' active-visited'   : '');
  document.getElementById('sbCancelled').className= 'status-btn' + (r.status === 'キャンセル'? ' active-cancelled' : '');

  const rows = [
    ['予約番号', r.reservation_number],
    ['来店日時', r.visit_date + ' ' + r.visit_time.slice(0,5)],
    ['担当者',   r.staff],
    ['コース',   r.course],
    ['オプション', r.options?.length > 0 ? r.options.map(o=>o.name).join('、') : 'なし'],
    ['合計',     r.total_price > 0 ? '¥' + r.total_price.toLocaleString() : '要確認'],
    ['ペット名', r.pet_name],
    ['性別',     r.gender],
    ['体重',     r.weight],
    ['年齢',     r.pet_age],
    ['ワクチン', r.vaccine_status],
    ['伝言',     r.staff_note || 'なし'],
    ['飼い主',   r.owner_name],
    ['電話',     r.phone],
    ['LINE',     r.line_name || 'なし'],
  ];
  document.getElementById('detailTable').innerHTML =
    rows.map(([k,v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('');
  document.getElementById('memoArea').value = r.staff_memo || '';
  document.getElementById('saveOk').classList.remove('active');
  document.getElementById('modalOverlay').classList.add('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

async function changeStatus(status) {
  if (!S.selectedResId) return;
  const { error } = await supabase.from('trimming_reservations').update({ status }).eq('id', S.selectedResId);
  if (!error) {
    document.getElementById('sbBooked').className   = 'status-btn' + (status === '予約済み'  ? ' active-booked'    : '');
    document.getElementById('sbVisited').className  = 'status-btn' + (status === '来店済み'  ? ' active-visited'   : '');
    document.getElementById('sbCancelled').className= 'status-btn' + (status === 'キャンセル'? ' active-cancelled' : '');
    const idx = S.reservations.findIndex(r => r.id === S.selectedResId);
    if (idx !== -1) { S.reservations[idx].status = status; render(); }
  }
}

async function saveMemo() {
  if (!S.selectedResId) return;
  const memo = document.getElementById('memoArea').value.trim();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  const { error } = await supabase.from('trimming_reservations').update({ staff_memo: memo || null }).eq('id', S.selectedResId);
  btn.disabled = false;
  if (!error) {
    document.getElementById('saveOk').classList.add('active');
    setTimeout(() => document.getElementById('saveOk').classList.remove('active'), 2000);
    const idx = S.reservations.findIndex(r => r.id === S.selectedResId);
    if (idx !== -1) S.reservations[idx].staff_memo = memo || null;
  }
}

// ── 初期化 ────────────────────────────────────────
checkAuth();
</script>
